<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha IA Local e Gratuita</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #343541;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL (SIDEBAR) */
        .sidebar {
            width: 260px;
            background-color: #202123;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .btn-nova-conversa {
            background-color: transparent;
            color: white;
            border: 1px solid #4d4d4f;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-nova-conversa:hover {
            background-color: #2a2b32;
        }

        .sidebar-tabs {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #4d4d4f;
            padding-bottom: 5px;
            font-size: 11px;
        }

        .tab {
            cursor: pointer;
            color: #8e8ea0;
            padding: 4px 6px;
        }

        .tab.active {
            color: white;
            font-weight: bold;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .chat-item {
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #ececf1;
        }

        .chat-item:hover, .chat-item.active {
            background-color: #343541;
        }

        .chat-item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .chat-item-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
        }

        .chat-item:hover .chat-item-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            color: #8e8ea0;
            cursor: pointer;
            font-size: 12px;
        }

        .action-btn:hover {
            color: white;
        }

        /* ÁREA PRINCIPAL DO CHAT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .message {
            padding: 20px;
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            line-height: 1.6;
            font-size: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .user-message {
            background-color: #343541;
        }

        .bot-message {
            background-color: #444654;
        }

        .regenerate-container {
            max-width: 850px;
            width: 100%;
            margin: -15px auto 0 auto;
            padding-left: 20px;
        }

        .btn-regenerate {
            background: #2a2b32;
            border: 1px solid #4d4d4f;
            color: #ececf1;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* ENTRADA DE TEXTO */
        .input-area {
            background-image: linear-gradient(180deg,rgba(52,53,65,0),#343541 70%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            display: flex;
            background-color: #40414f;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 10px;
            border: 1px solid #565869;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 5px;
        }

        .btn-send {
            padding: 5px 15px;
            border-radius: 5px;
            border: none;
            background-color: #19C37D;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-send:hover {
            background-color: #1a9c68;
        }

        .info-footer {
            font-size: 11px;
            color: #8e8ea0;
            text-align: center;
        }

        .memory-item {
            padding: 8px;
            background: #2a2b32;
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="btn-nova-conversa" onclick="criarNovaConversa()">➕ Nova conversa Local</button>
        
        <div class="sidebar-tabs">
            <span class="tab active" id="tab-ativas" onclick="mudarAba('ativas')">Ativas</span>
            <span class="tab" id="tab-arquivadas" onclick="mudarAba('arquivadas')">Arquivadas</span>
            <span class="tab" id="tab-lixeira" onclick="mudarAba('lixeira')">Lixeira</span>
            <span class="tab" id="tab-memoria" onclick="mudarAba('memoria')">Memória</span>
        </div>

        <div class="chat-list" id="chatListContainer"></div>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Digite uma pergunta ou use 'Lembre que...'" onkeypress="verificarTecla(event)">
                <button class="btn-send" onclick="enviarMensagem()">Enviar</button>
            </div>
            <div class="info-footer">
                Interface Offline/Híbrida. Sem chaves de API necessárias.
            </div>
        </div>
    </div>

    <script>
        let conversas = JSON.parse(localStorage.getItem('conversas')) || [];
        let memorias = JSON.parse(localStorage.getItem('memorias')) || [];
        let atualChatId = localStorage.getItem('atualChatId') || null;
        let abaAtiva = 'ativas';

        if (conversas.length === 0) {
            criarNovaConversa("Chat Livre");
        } else {
            if(!atualChatId) atualChatId = conversas[0].id;
            renderizarAbasEListas();
            renderizarMensagens();
        }

        function criarNovaConversa(titulo = "Nova conversa") {
            const id = Date.now().toString();
            const nova = {
                id: id,
                titulo: titulo,
                status: 'ativas',
                mensagens: [{
                    role: 'bot',
                    textos: ["Olá! Sou seu assistente local inteligente. Não preciso de chaves de acesso. Posso processar comandos de memória, responder a saudações e pesquisar em tempo real fontes de dados complexas para você!"],
                    indexAtivo: 0
                }]
            };
            conversas.unshift(nova);
            atualChatId = id;
            abaAtiva = 'ativas';
            salvarDados();
            renderizarAbasEListas();
            renderizarMensagens();
        }

        function selecionarConversa(id) {
            atualChatId = id;
            salvarDados();
            renderizarAbasEListas();
            renderizarMensagens();
        }

        function renomearConversa(id, event) {
            event.stopPropagation();
            const novoNome = prompt("Digite o novo nome da conversa:");
            if (novoNome && novoNome.trim() !== "") {
                const c = conversas.find(x => x.id === id);
                if (c) c.titulo = novoNome.trim();
                salvarDados();
                renderizarAbasEListas();
            }
        }

        function alterarStatusConversa(id, novoStatus, event) {
            event.stopPropagation();
            const c = conversas.find(x => x.id === id);
            if (c) {
                c.status = novoStatus;
                if (atualChatId === id) {
                    const restante = conversas.find(x => x.status === abaAtiva);
                    atualChatId = restante ? restante.id : null;
                }
                salvarDados();
                renderizarAbasEListas();
                renderizarMensagens();
            }
        }

        function excluirPermanentemente(id, event) {
            event.stopPropagation();
            if (confirm("Deseja apagar permanentemente esta conversa?")) {
                conversas = conversas.filter(x => x.id !== id);
                if (atualChatId === id) {
                    const restante = conversas.find(x => x.status === 'lixeira');
                    atualChatId = restante ? restante.id : null;
                }
                salvarDados();
                renderizarAbasEListas();
                renderizarMensagens();
            }
        }

        function mudarAba(aba) {
            abaAtiva = aba;
            renderizarAbasEListas();
        }

        // MEMÓRIA LOCAL
        function processarMemoria(texto) {
            const lower = texto.toLowerCase();
            if (lower.startsWith("lembre que ")) {
                const fato = texto.substring(11).trim();
                if(fato) {
                    memorias.push(fato);
                    salvarDados();
                    return `Entendido. Registrei de forma permanente na minha memória: "${fato}".`;
                }
            }
            if (lower.includes("o que você lembra sobre mim") || lower.includes("o que você sabe sobre mim")) {
                if (memorias.length === 0) return "Até o momento, não possuo registros de fatos customizados salvos sobre você.";
                return "Aqui estão as informações armazenadas no meu banco de dados local:\n" + memorias.map(m => `• ${m}`).join("\n");
            }
            return null;
        }

        function deletarMemoria(index) {
            memorias.splice(index, 1);
            salvarDados();
            renderizarAbasEListas();
        }

        // MOTOR DE PROCESSAMENTO LOCAL (Substitui a IA Paga)
        function analisarConversaLocal(texto) {
            const frase = texto.toLowerCase().trim();
            
            // Dicionário de respostas rápidas
            if (frase === 'oi' || frase === 'olá' || frase === 'ola') {
                return ["Olá! Como posso te ajudar hoje?", "Oi! Tudo bem? Em que posso ser útil?"];
            }
            if (frase.includes('tudo bem') || frase.includes('como voce esta')) {
                return ["Tudo ótimo por aqui! Operando com 100% de capacidade local. E com você?", "Estou funcionando perfeitamente! Como posso ajudar você hoje?"];
            }
            if (frase.includes('seu nome') || frase.includes('quem e voce')) {
                return ["Eu sou o seu assistente virtual inteligente baseado em HTML local!", "Você pode me chamar de IA Local. Sou um motor inteligente focado em privacidade."];
            }
            if (frase.includes('obrigado') || frase.includes('valeu')) {
                return ["De nada! Se precisar de mais alguma pesquisa, estarei aqui.", "Disponha! É sempre um prazer ajudar."];
            }
            
            return null; // Se não for conversa fiada, vai pesquisar
        }

        function limparTermoBusca(frase) {
            let termo = frase.toLowerCase();
            const filtros = ["me fale sobre a", "me fale sobre o", "me fale sobre", "o que e o", "o que e a", "o que e um", "o que e uma", "o que e", "quem foi", "pesquise", "defina"];
            for (let f of filtros) {
                if (termo.startsWith(f)) {
                    termo = termo.substring(f.length).trim();
                    break;
                }
            }
            return termo;
        }

        // ENVIO DE MENSAGENS AVANÇADO
        async function enviarMensagem() {
            const input = document.getElementById('userInput');
            const textoOriginal = input.value.trim();
            if (!textoOriginal || !atualChatId) return;

            input.value = "";
            const chat = conversas.find(x => x.id === atualChatId);
            
            chat.mensagens.push({ role: 'user', texto: textoOriginal });
            renderizarMensagens();

            // 1. Valida Sistema de Memória
            const respostaMemoria = processarMemoria(textoOriginal);
            if (respostaMemoria) {
                chat.mensagens.push({ role: 'bot', textos: [respostaMemoria], indexAtivo: 0 });
                salvarDados();
                renderizarMensagens();
                return;
            }

            // 2. Valida Dicionário Conversacional Local
            const respostaLocal = analisarConversaLocal(textoOriginal);
            if (respostaLocal) {
                chat.mensagens.push({ role: 'bot', textos: respostaLocal, indexAtivo: 0 });
                salvarDados();
                renderizarMensagens();
                return;
            }

            // 3. Busca Dinâmica Externa Gratuita (Wikipedia Engine Pro)
            const termoLimpo = limparTermoBusca(textoOriginal);
            
            // Cria indicador visual
            const msgIndex = chat.mensagens.length;
            chat.mensagens.push({ role: 'bot', textos: ["Analisando banco de dados e processando resposta..."], indexAtivo: 0 });
            renderizarMensagens();

            try {
                // Requisição longa (2000 caracteres) sem chaves ou tokens
                const url = `https://pt.wikipedia.org/w/api.php?action=query&origin=*&format=json&prop=extracts&explaintext=1&exchars=2000&generator=search&gsrsearch=${encodeURIComponent(termoLimpo)}&gsrlimit=3`;
                const resposta = await fetch(url);
                const dados = await resposta.json();

                let pacotesRespostas = [];

                if (dados.query && dados.query.pages) {
                    const paginas = dados.query.pages;
                    for (let id in paginas) {
                        if (paginas[id].extract) {
                            pacotesRespostas.push(`[CONTEXTO ENCONTRADO: ${paginas[id].title.toUpperCase()}]\n\n${paginas[id].extract}`);
                        }
                    }
                }

                if (pacotesRespostas.length === 0) {
                    pacotesRespostas.push(`Não encontrei dados exatos sobre "${termoLimpo}". Tente refinar sua frase digitando apenas palavras-chave chaves.`);
                }

                // Carrega as respostas reais e ativa a alternância
                chat.mensagens[msgIndex].textos = pacotesRespostas;

                if (chat.titulo === "Nova conversa" || chat.titulo === "Chat Livre") {
                    chat.titulo = termoLimpo.charAt(0).toUpperCase() + termoLimpo.slice(1);
                    renderizarAbasEListas();
                }

            } catch (e) {
                chat.mensagens[msgIndex].textos = ["Desculpe, ocorreu uma oscilação na rede local ao buscar os dados."];
            }

            salvarDados();
            renderizarMensagens();
        }

        function alternarResposta(msgIndex) {
            const chat = conversas.find(x => x.id === atualChatId);
            const msg = chat.mensagens[msgIndex];
            msg.indexAtivo = (msg.indexAtivo + 1) % msg.textos.length;
            salvarDados();
            renderizarMensagens();
        }

        // GESTÃO DA INTERFACE GRÁFICA
        function renderizarAbasEListas() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const tabElement = document.getElementById(`tab-${abaAtiva}`);
            if(tabElement) tabElement.classList.add('active');

            const container = document.getElementById('chatListContainer');
            container.innerHTML = "";

            if (abaAtiva === 'memoria') {
                if(memorias.length === 0) container.innerHTML = "<div style='font-size:12px;color:#8e8ea0;padding:10px;'>Sem memórias gravadas.</div>";
                memorias.forEach((m, idx) => {
                    container.innerHTML += `<div class="memory-item"><span>${m}</span><button class="action-btn" onclick="deletarMemoria(${idx})">❌</button></div>`;
                });
                return;
            }

            const filtradas = conversas.filter(x => x.status === abaAtiva);
            if(filtradas.length === 0) container.innerHTML = "<div style='font-size:12px;color:#8e8ea0;padding:10px;'>Vazio.</div>";

            filtradas.forEach(c => {
                const isActive = c.id === atualChatId ? 'active' : '';
                let botoesAcao = '';

                if (abaAtiva === 'ativas') {
                    botoesAcao = `
                        <button class="action-btn" onclick="renomearConversa('${c.id}', event)">✏️</button>
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'arquivadas', event)">📦</button>
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'lixeira', event)">🗑️</button>
                    `;
                } else if (abaAtiva === 'arquivadas') {
                    botoesAcao = `
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'ativas', event)">↩️</button>
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'lixeira', event)">🗑️</button>
                    `;
                } else if (abaAtiva === 'lixeira') {
                    botoesAcao = `
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'ativas', event)">↩️</button>
                        <button class="action-btn" onclick="excluirPermanentemente('${c.id}', event)">❌</button>
                    `;
                }

                container.innerHTML += `
                    <div class="chat-item ${isActive}" onclick="selecionarConversa('${c.id}')">
                        <span class="chat-item-title">💬 ${c.titulo}</span>
                        <div class="chat-item-actions">${botoesAcao}</div>
                    </div>
                `;
            });
        }

        function renderizarMensagens() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = "";

            if (!atualChatId) {
                container.innerHTML = "<div style='text-align:center;color:#8e8ea0;margin-top:50px;'>Crie uma nova sessão na barra lateral.</div>";
                return;
            }

            const chat = conversas.find(x => x.id === atualChatId);
            if (!chat) return;

            chat.mensagens.forEach((msg, idx) => {
                const row = document.createElement('div');
                row.className = "message-row";

                if (msg.role === 'user') {
                    row.innerHTML = `<div class="message user-message"><b>Você:</b><br>${msg.texto}</div>`;
                } else {
                    const textoExibido = msg.textos[msg.indexAtivo];
                    const paginasContador = msg.textos.length > 1 ? `<span style="float:right;color:#8e8ea0;font-size:12px;background:#202123;padding:2px 6px;border-radius:4px;">Variação de Resposta ${msg.indexAtivo + 1} de ${msg.textos.length}</span>` : '';
                    
                    let htmlBot = `
                        <div class="message bot-message">
                            ${paginasContador}
                            <b>Sistema Local:</b><br><br>${textoExibido.replace(/\n/g, '<br>')}
                        </div>
                    `;

                    if (msg.textos.length > 1) {
                        htmlBot += `
                            <div class="regenerate-container">
                                <button class="btn-regenerate" onclick="alternarResposta(${idx})">🔄 Alternar variação / Outro ponto de vista</button>
                            </div>
                        `;
                    }
                    row.innerHTML = htmlBot;
                }
                container.appendChild(row);
            });

            container.scrollTop = container.scrollHeight;
        }

        function salvarDados() {
            localStorage.setItem('conversas', JSON.stringify(conversas));
            localStorage.setItem('memorias', JSON.stringify(memorias));
            localStorage.setItem('atualChatId', atualChatId);
        }

        function verificarTecla(event) {
            if (event.key === "Enter") {
                enviarMensagem();
            }
        }
    </script>
</body>
</html>
