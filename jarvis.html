<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Clone Pro - Respostas Avançadas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #343541;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL (SIDEBAR) */
        .sidebar {
            width: 260px;
            background-color: #202123;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .btn-nova-conversa {
            background-color: transparent;
            color: white;
            border: 1px solid #4d4d4f;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-nova-conversa:hover {
            background-color: #2a2b32;
        }

        .sidebar-tabs {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #4d4d4f;
            padding-bottom: 5px;
            font-size: 11px;
        }

        .tab {
            cursor: pointer;
            color: #8e8ea0;
            padding: 4px 6px;
        }

        .tab.active {
            color: white;
            font-weight: bold;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .chat-item {
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #ececf1;
            background-color: transparent;
        }

        .chat-item:hover, .chat-item.active {
            background-color: #343541;
        }

        .chat-item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .chat-item-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
        }

        .chat-item:hover .chat-item-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            color: #8e8ea0;
            cursor: pointer;
            font-size: 12px;
        }

        .action-btn:hover {
            color: white;
        }

        /* ÁREA PRINCIPAL DO CHAT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .message {
            padding: 20px;
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            line-height: 1.6;
            font-size: 15px;
            border-radius: 8px;
            position: relative;
        }

        .user-message {
            background-color: #343541;
        }

        .bot-message {
            background-color: #444654;
        }

        .regenerate-container {
            max-width: 850px;
            width: 100%;
            margin: -15px auto 0 auto;
            padding-left: 20px;
        }

        .btn-regenerate {
            background: #2a2b32;
            border: 1px solid #4d4d4f;
            color: #ececf1;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-regenerate:hover {
            background-color: #40414f;
        }

        /* BARRA DE ENTRADA DE TEXTO */
        .input-area {
            background-image: linear-gradient(180deg,rgba(52,53,65,0),#343541 70%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            display: flex;
            background-color: #40414f;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 10px;
            border: 1px solid #565869;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 5px;
        }

        .btn-send {
            padding: 5px 15px;
            border-radius: 5px;
            border: none;
            background-color: #19C37D;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-send:hover {
            background-color: #1a9c68;
        }

        .info-footer {
            font-size: 11px;
            color: #8e8ea0;
        }

        .memory-item {
            padding: 8px;
            background: #2a2b32;
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="btn-nova-conversa" onclick="criarNovaConversa()">➕ Nova conversa</button>
        
        <div class="sidebar-tabs">
            <span class="tab active" id="tab-ativas" onclick="mudarAba('ativas')">Ativas</span>
            <span class="tab" id="tab-arquivadas" onclick="mudarAba('arquivadas')">Arquivadas</span>
            <span class="tab" id="tab-lixeira" onclick="mudarAba('lixeira')">Lixeira</span>
            <span class="tab" id="tab-memoria" onclick="mudarAba('memoria')">Memória</span>
        </div>

        <div class="chat-list" id="chatListContainer"></div>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Faça uma pergunta detalhada aqui..." onkeypress="verificarTecla(event)">
                <button class="btn-send" onclick="enviarMensagem()">Enviar</button>
            </div>
            <div class="info-footer">Agora configurada para extrair respostas longas, dados técnicos e seções aprofundadas.</div>
        </div>
    </div>

    <script>
        let conversas = JSON.parse(localStorage.getItem('conversas')) || [];
        let memorias = JSON.parse(localStorage.getItem('memorias')) || [];
        let atualChatId = localStorage.getItem('atualChatId') || null;
        let abaAtiva = 'ativas';

        if (conversas.length === 0) {
            criarNovaConversa("Explorador Avançado");
        } else {
            if(!atualChatId) atualChatId = conversas[0].id;
            renderizarAbasEListas();
            renderizarMensagens();
        }

        function criarNovaConversa(titulo = "Nova conversa") {
            const id = Date.now().toString();
            const nova = {
                id: id,
                titulo: titulo,
                status: 'ativas',
                mensagens: [{
                    role: 'bot',
                    textos: ["Olá! Sou seu assistente de pesquisa aprofundada. Pode me fazer perguntas complexas que buscarei os detalhes mais específicos disponíveis."],
                    indexAtivo: 0
                }]
            };
            conversas.unshift(nova);
            atualChatId = id;
            abaAtiva = 'ativas';
            salvarDados();
            renderizarAbasEListas();
            renderizarMensagens();
        }

        function selecionarConversa(id) {
            atualChatId = id;
            salvarDados();
            renderizarAbasEListas();
            renderizarMensagens();
        }

        function renomearConversa(id, event) {
            event.stopPropagation();
            const novoNome = prompt("Digite o novo nome da conversa:");
            if (novoNome && novoNome.trim() !== "") {
                const c = conversas.find(x => x.id === id);
                if (c) c.titulo = novoNome.trim();
                salvarDados();
                renderizarAbasEListas();
            }
        }

        function alterarStatusConversa(id, novoStatus, event) {
            event.stopPropagation();
            const c = conversas.find(x => x.id === id);
            if (c) {
                c.status = novoStatus;
                if (atualChatId === id) {
                    const restante = conversas.find(x => x.status === abaAtiva);
                    atualChatId = restante ? restante.id : null;
                }
                salvarDados();
                renderizarAbasEListas();
                renderizarMensagens();
            }
        }

        function excluirPermanentemente(id, event) {
            event.stopPropagation();
            if (confirm("Deseja apagar permanentemente esta conversa?")) {
                conversas = conversas.filter(x => x.id !== id);
                if (atualChatId === id) {
                    const restante = conversas.find(x => x.status === 'lixeira');
                    atualChatId = restante ? restante.id : null;
                }
                salvarDados();
                renderizarAbasEListas();
                renderizarMensagens();
            }
        }

        function mudarAba(aba) {
            abaAtiva = aba;
            renderizarAbasEListas();
        }

        function processarMemoria(texto) {
            const lower = texto.toLowerCase();
            if (lower.startsWith("lembre que ")) {
                const fato = texto.substring(11).trim();
                if(fato) {
                    memorias.push(fato);
                    salvarDados();
                    return `Fato específico armazenado com sucesso na memória de longo prazo: "${fato}".`;
                }
            }
            if (lower.includes("o que você lembra sobre mim") || lower.includes("o que você sabe sobre mim")) {
                if (memorias.length === 0) return "Minha base de dados de memória pessoal está vazia no momento.";
                return "Fatos específicos recuperados sobre você:\n" + memorias.map(m => `• ${m}`).join("\n");
            }
            return null;
        }

        function deletarMemoria(index) {
            memorias.splice(index, 1);
            salvarDados();
            renderizarAbasEListas();
        }

        // FUNÇÃO DE LIMPEZA FILTRADA (Deixa a busca focada e específica)
        function extrairTermoEspecifico(frase) {
            let termo = frase.toLowerCase();
            
            // Lista de expressões comuns que "escondem" o assunto principal
            const termosInuteis = [
                "me fale sobre a", "me fale sobre o", "me fale sobre", 
                "o que e uma", "o que e um", "o que e o", "o que e a", "o que e", 
                "quem foi o", "quem foi a", "quem foi", "explique sobre",
                "pesquise sobre", "o que significa", "fale especificamente sobre"
            ];

            // Remove acentos básicos para facilitar a checagem do filtro
            let termoSemAcento = termo.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            for (let prefixo of termosInuteis) {
                if (termoSemAcento.startsWith(prefixo)) {
                    termo = termo.substring(prefixo.length).trim();
                    break;
                }
            }
            return termo;
        }

        // SISTEMA DE ENVIO COM AGREGADOR DE CONTEÚDO ESPECÍFICO
        async function enviarMensagem() {
            const input = document.getElementById('userInput');
            const textoOriginal = input.value.trim();
            if (!textoOriginal || !atualChatId) return;

            input.value = "";
            const chat = conversas.find(x => x.id === atualChatId);
            
            chat.mensagens.push({ role: 'user', texto: textoOriginal });
            renderizarMensagens();

            const respostaMemoria = processarMemoria(textoOriginal);
            if (respostaMemoria) {
                chat.mensagens.push({ role: 'bot', textos: [respostaMemoria], indexAtivo: 0 });
                salvarDados();
                renderizarMensagens();
                return;
            }

            // Limpa a pergunta para focar no assunto específico
            const termoEspecifico = extrairTermoEspecifico(textoOriginal);

            try {
                // ALTERAÇÕES DA API: Retirado o 'exintro' e adicionado 'exchars=2000' para trazer dados profundos
                const url = `https://pt.wikipedia.org/w/api.php?action=query&origin=*&format=json&prop=extracts&explaintext=1&exchars=2000&generator=search&gsrsearch=${encodeURIComponent(termoEspecifico)}&gsrlimit=3`;
                
                const resposta = await fetch(url);
                const dados = await resposta.json();

                let pacotesRespostas = [];

                if (dados.query && dados.query.pages) {
                    const paginas = dados.query.pages;
                    for (let id in paginas) {
                        if (paginas[id].extract && paginas[id].extract.trim() !== "") {
                            // Formata o título e o texto de forma limpa e longa
                            const tituloArtigo = paginas[id].title.toUpperCase();
                            const textoArtigo = paginas[id].extract;
                            pacotesRespostas.push(`[FONTE ESPECÍFICA: ${tituloArtigo}]\n\n${textoArtigo}`);
                        }
                    }
                }

                if (pacotesRespostas.length === 0) {
                    pacotesRespostas.push(`Não localizei registros específicos para o termo de pesquisa atual ("${termoEspecifico}"). Tente refinar sua pergunta usando termos mais técnicos.`);
                }

                chat.mensagens.push({
                    role: 'bot',
                    textos: pacotesRespostas,
                    indexAtivo: 0
                });

                // Renomeia automaticamente o título da conversa com o assunto pesquisado
                if (chat.titulo === "Nova conversa" || chat.titulo === "Explorador Avançado") {
                    chat.titulo = termoEspecifico.charAt(0).toUpperCase() + termoEspecifico.slice(1);
                    renderizarAbasEListas();
                }

            } catch (e) {
                chat.mensagens.push({
                    role: 'bot',
                    textos: ["Falha técnica de comunicação ao tentar coletar dados específicos."],
                    indexAtivo: 0
                });
            }

            salvarDados();
            renderizarMensagens();
        }

        function alternarResposta(msgIndex) {
            const chat = conversas.find(x => x.id === atualChatId);
            const msg = chat.mensagens[msgIndex];
            msg.indexAtivo = (msg.indexAtivo + 1) % msg.textos.length;
            salvarDados();
            renderizarMensagens();
        }

        function renderizarAbasEListas() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${abaAtiva}`).classList.add('active');

            const container = document.getElementById('chatListContainer');
            container.innerHTML = "";

            if (abaAtiva === 'memoria') {
                if(memorias.length === 0) container.innerHTML = "<div style='font-size:12px;color:#8e8ea0;padding:10px;'>Nenhum dado salvo.</div>";
                memorias.forEach((m, idx) => {
                    container.innerHTML += `
                        <div class="memory-item">
                            <span>${m}</span>
                            <button class="action-btn" onclick="deletarMemoria(${idx})">❌</button>
                        </div>`;
                });
                return;
            }

            const filtradas = conversas.filter(x => x.status === abaAtiva);

            if(filtradas.length === 0) {
                container.innerHTML = `<div style='font-size:12px;color:#8e8ea0;padding:10px;'>Sem históricos aqui.</div>`;
            }

            filtradas.forEach(c => {
                const isActive = c.id === atualChatId ? 'active' : '';
                let botoesAcao = '';

                if (abaAtiva === 'ativas') {
                    botoesAcao = `
                        <button class="action-btn" title="Renomear" onclick="renomearConversa('${c.id}', event)">✏️</button>
                        <button class="action-btn" title="Arquivar" onclick="alterarStatusConversa('${c.id}', 'arquivadas', event)">📦</button>
                        <button class="action-btn" title="Lixeira" onclick="alterarStatusConversa('${c.id}', 'lixeira', event)">🗑️</button>
                    `;
                } else if (abaAtiva === 'arquivadas') {
                    botoesAcao = `
                        <button class="action-btn" title="Desarquivar" onclick="alterarStatusConversa('${c.id}', 'ativas', event)">↩️</button>
                        <button class="action-btn" title="Lixeira" onclick="alterarStatusConversa('${c.id}', 'lixeira', event)">🗑️</button>
                    `;
                } else if (abaAtiva === 'lixeira') {
                    botoesAcao = `
                        <button class="action-btn" title="Recuperar" onclick="alterarStatusConversa('${c.id}', 'ativas', event)">↩️</button>
                        <button class="action-btn" title="Apagar para sempre" onclick="excluirPermanentemente('${c.id}', event)">❌</button>
                    `;
                }

                container.innerHTML += `
                    <div class="chat-item ${isActive}" onclick="selecionarConversa('${c.id}')">
                        <span class="chat-item-title">💬 ${c.titulo}</span>
                        <div class="chat-item-actions">${botoesAcao}</div>
                    </div>
                `;
            });
        }

        function renderizarMensagens() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = "";

            if (!atualChatId) {
                container.innerHTML = "<div style='text-align:center;color:#8e8ea0;margin-top:50px;'>Abra ou crie um chat para interagir.</div>";
                return;
            }

            const chat = conversas.find(x => x.id === atualChatId);
            if (!chat) return;

            chat.mensagens.forEach((msg, idx) => {
                const row = document.createElement('div');
                row.className = "message-row";

                if (msg.role === 'user') {
                    row.innerHTML = `<div class="message user-message"><b>Você:</b><br>${msg.texto}</div>`;
                } else {
                    const textoExibido = msg.textos[msg.indexAtivo];
                    const paginasContador = msg.textos.length > 1 ? `<span style="float:right;color:#a8a8b3;font-size:12px;background:#202123;padding:2px 6px;border-radius:4px;">Resultado ${msg.indexAtivo + 1} de ${msg.textos.length}</span>` : '';
                    
                    let htmlBot = `
                        <div class="message bot-message">
                            ${paginasContador}
                            <b>IA Especializada:</b><br><br>${textoExibido.replace(/\n/g, '<br>')}
                        </div>
                    `;

                    if (msg.textos.length > 1) {
                        htmlBot += `
                            <div class="regenerate-container">
                                <button class="btn-regenerate" onclick="alternarResposta(${idx})">🔄 Alternar para outra vertente ou contexto</button>
                            </div>
                        `;
                    }
                    row.innerHTML = htmlBot;
                }

                container.appendChild(row);
            });

            container.scrollTop = container.scrollHeight;
        }

        function salvarDados() {
            localStorage.setItem('conversas', JSON.stringify(conversas));
            localStorage.setItem('memorias', JSON.stringify(memorias));
            localStorage.setItem('atualChatId', atualChatId);
        }

        function verificarTecla(event) {
            if (event.key === "Enter") {
                enviarMensagem();
            }
        }
    </script>
</body>
</html>
