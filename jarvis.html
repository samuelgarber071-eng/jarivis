<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu ChatGPT Inteligente com Busca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #343541;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Área do Chat */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.5;
        }

        /* Mensagem do Usuário */
        .user-message {
            background-color: #202123;
            align-self: flex-end;
        }

        /* Mensagem da IA */
        .bot-message {
            background-color: #444654;
            align-self: flex-start;
        }

        /* Barra de Entrada de Texto */
        .input-area {
            background-color: #40414F;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            background-color: #40414F;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #565869;
            background-color: #40414F;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background-color: #19C37D;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1a9c68;
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chatContainer">
        <div class="message bot-message">Olá! Pode me fazer perguntas ou pedir explicações (ex: "O que é HTML?", "Quem foi Einstein?", "Como funciona o Sol?"). Eu vou pesquisar na internet para te responder!</div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Faça uma pergunta..." onkeypress="verificarTecla(event)">
            <button onclick="enviarMensagem()">Enviar</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        async function enviarMensagem() {
            const textoUsuario = userInput.value.trim();
            if (textoUsuario === "") return;

            // 1. Mostra a mensagem que você digitou
            criarMensagem(textoUsuario, 'user-message');
            userInput.value = ""; 

            // 2. Cria o balão de "Pensando..."
            const balaoIA = criarMensagem("Pesquisando na internet, por favor aguarde...", 'bot-message');

            // 3. Faz a busca real inteligente na API da Wikipedia
            try {
                // Esta URL pesquisa pelo texto e já traz o resumo explicativo (extract) do melhor resultado
                const url = `https://pt.wikipedia.org/w/api.php?action=query&origin=*&format=json&prop=extracts&exintro=1&explaintext=1&generator=search&gsrsearch=${encodeURIComponent(textoUsuario)}&gsrlimit=1`;
                
                const resposta = await fetch(url);
                const dados = await resposta.json();

                // Verifica se a Wikipedia encontrou alguma página correspondente
                if (!dados.query || !dados.query.pages) {
                    throw new Error("Não encontrado");
                }

                // A API da Wikipedia retorna os dados dentro do ID da página. Pegamos o primeiro resultado disponível:
                const paginas = dados.query.pages;
                const primeiroId = Object.keys(paginas)[0];
                
                if (primeiroId === "-1") {
                    throw new Error("Não encontrado");
                }

                const resumoFinal = paginas[primeiroId].extract;

                // 4. Substitui o "Pensando..." pela resposta real encontrada
                balaoIA.innerText = resumoFinal;

            } catch (erro) {
                // Mensagem amigável caso não encontre nada ou falhe a conexão
                balaoIA.innerText = `Desculpe, pesquisei mas não encontrei informações claras sobre o que você pediu. Tente reformular a pergunta usando palavras-chave mais simples!`;
            }
        }

        // Função para colocar a mensagem na tela
        function criarMensagem(texto, classe) {
            const div = document.createElement('div');
            div.className = `message ${classe}`;
            div.innerText = texto;
            chatContainer.appendChild(div);
            
            // Força a barra de rolagem a ir para o final do chat
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div; 
        }

        // Envia ao apertar Enter
        function verificarTecla(event) {
            if (event.key === "Enter") {
                enviarMensagem();
            }
        }
    </script>
</body>
</html>
