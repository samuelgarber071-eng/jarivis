<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clone do ChatGPT com Busca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #343541;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.5;
        }

        .user-message {
            background-color: #202123;
            align-self: flex-end;
        }

        .bot-message {
            background-color: #444654;
            align-self: flex-start;
        }

        .input-area {
            background-color: #40414F;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            background-color: #40414F;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #565869;
            background-color: #40414F;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background-color: #19C37D;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a9c68;
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chatContainer">
        <div class="message bot-message">Olá! Pergunte-me sobre qualquer assunto (ex: "Gato", "Brasil", "Futebol") que eu vou pesquisar para você!</div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Digite um termo para pesquisar..." onkeypress="verificarTecla(event)">
            <button onclick="enviarMensagem()">Enviar</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        async function enviarMensagem() {
            const termoBusca = userInput.value.trim();
            if (termoBusca === "") return;

            // 1. Mostra a mensagem do usuário
            criarMensagem(termoBusca, 'user-message');
            userInput.value = ""; 

            // 2. Cria um balão de "Pensando..." para a IA
            const IdMensagemPensando = criarMensagem("Pesquisando na base de dados...", 'bot-message');

            // 3. Faz a busca real na API da Wikipedia
            try {
                // Monta a URL de busca da Wikipedia em português
                const url = `https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(termoBusca)}`;
                
                const resposta = await fetch(url);
                
                if (!resposta.ok) {
                    throw new Error("Não encontrado");
                }

                const dados = await resposta.json();
                
                // Atualiza o texto do balão com o resumo encontrado
                IdMensagemPensando.innerText = dados.extract;

            } catch (erro) {
                // Se a pesquisa falhar ou não achar o termo
                IdMensagemPensando.innerText = `Desculpe, não consegui encontrar informações sobre "${termoBusca}". Tente digitar de forma mais simples (ex: em vez de "o que é um gato", digite apenas "gato").`;
            }
        }

        function criarMensagem(texto, classe) {
            const div = document.createElement('div');
            div.className = `message ${classe}`;
            div.innerText = texto;
            chatContainer.appendChild(div);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div; // Retorna o elemento para podermos modificá-lo depois
        }

        function verificarTecla(event) {
            if (event.key === "Enter") {
                enviarMensagem();
            }
        }
    </script>
</body>
</html>
