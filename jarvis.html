<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Avançada - Estilo ChatGPT Intellect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #343541;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL */
        .sidebar {
            width: 260px;
            background-color: #202123;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .btn-nova-conversa {
            background-color: transparent;
            color: white;
            border: 1px solid #4d4d4f;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-nova-conversa:hover {
            background-color: #2a2b32;
        }

        .sidebar-tabs {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #4d4d4f;
            padding-bottom: 5px;
            font-size: 11px;
        }

        .tab {
            cursor: pointer;
            color: #8e8ea0;
            padding: 4px 6px;
        }

        .tab.active {
            color: white;
            font-weight: bold;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .chat-item {
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #ececf1;
        }

        .chat-item:hover, .chat-item.active {
            background-color: #343541;
        }

        .chat-item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .chat-item-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
        }

        .chat-item:hover .chat-item-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            color: #8e8ea0;
            cursor: pointer;
            font-size: 12px;
        }

        .action-btn:hover {
            color: white;
        }

        /* ÁREA PRINCIPAL */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .message {
            padding: 20px;
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            line-height: 1.6;
            font-size: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .user-message {
            background-color: #343541;
        }

        .bot-message {
            background-color: #444654;
            border: 1px solid #4d4d4f;
        }

        /* Estilização interna da resposta sintetizada */
        .gpt-section {
            margin-bottom: 15px;
        }
        .gpt-header {
            color: #19C37D;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .regenerate-container {
            max-width: 850px;
            width: 100%;
            margin: -15px auto 0 auto;
            padding-left: 20px;
        }

        .btn-regenerate {
            background: #2a2b32;
            border: 1px solid #4d4d4f;
            color: #ececf1;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* INPUT AREA */
        .input-area {
            background-image: linear-gradient(180deg,rgba(52,53,65,0),#343541 70%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            display: flex;
            background-color: #40414f;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 10px;
            border: 1px solid #565869;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 5px;
        }

        .btn-send {
            padding: 5px 15px;
            border-radius: 5px;
            border: none;
            background-color: #19C37D;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .memory-item {
            padding: 8px;
            background: #2a2b32;
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        
        /* Status de processamento estilo terminal */
        .thinking-status {
            font-style: italic;
            color: #8e8ea0;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="btn-nova-conversa" onclick="criarNovaConversa()">➕ Nova conversa Intellect</button>
        
        <div class="sidebar-tabs">
            <span class="tab active" id="tab-ativas" onclick="mudarAba('ativas')">Ativas</span>
            <span class="tab" id="tab-arquivadas" onclick="mudarAba('arquivadas')">Arquivadas</span>
            <span class="tab" id="tab-lixeira" onclick="mudarAba('lixeira')">Lixeira</span>
            <span class="tab" id="tab-memoria" onclick="mudarAba('memoria')">Memória</span>
        </div>

        <div class="chat-list" id="chatListContainer"></div>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Faça uma pergunta complexa..." onkeypress="verificarTecla(event)">
                <button class="btn-send" onclick="enviarMensagem()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        let conversas = JSON.parse(localStorage.getItem('conversas')) || [];
        let memorias = JSON.parse(localStorage.getItem('memorias')) || [];
        let atualChatId = localStorage.getItem('atualChatId') || null;
        let abaAtiva = 'ativas';
        let estaDigitando = false; // Bloqueia spam de cliques enquanto a IA digita

        if (conversas.length === 0) {
            criarNovaConversa("Análise Intelectual");
        } else {
            if(!atualChatId) atualChatId = conversas[0].id;
            renderizarAbasEListas();
            renderizarMensagens();
        }

        function criarNovaConversa(titulo = "Nova conversa") {
            if(estaDigitando) return;
            const id = Date.now().toString();
            const nova = {
                id: id,
                titulo: titulo,
                status: 'ativas',
                mensagens: [{
                    role: 'bot',
                    textos: [`<div class="gpt-section"><div class="gpt-header">🤖 Sistema de Raciocínio Ativo</div>Olá! Elevei minhas capacidades de processamento em 100%. Agora, qualquer busca realizada passa por um motor de reestruturação cognitiva. Eu analiso o contexto, separo dados em camadas intelectuais e formato os resultados para otimizar sua leitura. Como posso te ajudar?</div>`],
                    indexAtivo: 0
                }]
            };
            conversas.unshift(nova);
            atualChatId = id;
            abaAtiva = 'ativas';
            salvarDados();
            renderizarAbasEListas();
            renderizarMensagens();
        }

        function selecionarConversa(id) {
            if(estaDigitando) return;
            atualChatId = id;
            salvarDados();
            renderizarAbasEListas();
            renderizarMensagens();
        }

        function renomearConversa(id, event) {
            event.stopPropagation();
            const novoNome = prompt("Renomear sessão:");
            if (novoNome && novoNome.trim() !== "") {
                const c = conversas.find(x => x.id === id);
                if (c) c.titulo = novoNome.trim();
                salvarDados();
                renderizarAbasEListas();
            }
        }

        function alterarStatusConversa(id, novoStatus, event) {
            event.stopPropagation();
            const c = conversas.find(x => x.id === id);
            if (c) {
                c.status = novoStatus;
                if (atualChatId === id) {
                    const restante = conversas.find(x => x.status === abaAtiva);
                    atualChatId = restante ? restante.id : null;
                }
                salvarDados();
                renderizarAbasEListas();
                renderizarMensagens();
            }
        }

        function excluirPermanentemente(id, event) {
            event.stopPropagation();
            if (confirm("Apagar para sempre?")) {
                conversas = conversas.filter(x => x.id !== id);
                if (atualChatId === id) {
                    const restante = conversas.find(x => x.status === 'lixeira');
                    atualChatId = restante ? restante.id : null;
                }
                salvarDados();
                renderizarAbasEListas();
                renderizarMensagens();
            }
        }

        function mudarAba(aba) {
            abaAtiva = aba;
            renderizarAbasEListas();
        }

        // MEMÓRIA
        function processarMemoria(texto) {
            const lower = texto.toLowerCase();
            if (lower.startsWith("lembre que ")) {
                const fato = texto.substring(11).trim();
                if(fato) {
                    memorias.push(fato);
                    salvarDados();
                    return `<div class="gpt-section"><div class="gpt-header">🧠 Memória Guardada</div>Entendido. Armazenei a seguinte diretiva no meu banco de dados de longo prazo: <i>"${fato}"</i>.</div>`;
                }
            }
            if (lower.includes("o que você lembra sobre mim") || lower.includes("o que você sabe sobre mim")) {
                if (memorias.length === 0) return `<div class="gpt-section"><div class="gpt-header">🧠 Memória Vazia</div>Não mapeei nenhuma informação customizada sobre você ainda.</div>`;
                return `<div class="gpt-section"><div class="gpt-header">🧠 Dados de Memória Recuperados</div>Aqui está o seu perfil baseado no histórico local:<br>` + memorias.map(m => `• <b>${m}</b>`).join("<br>") + `</div>`;
            }
            return null;
        }

        function deletarMemoria(index) {
            memorias.splice(index, 1);
            salvarDados();
            renderizarAbasEListas();
        }

        // MOTOR DE PROCESSAMENTO INTELECTUAL (Estilo ChatGPT)
        function estruturarComoGPT(titulo, textoBruto) {
            // Divide o texto bruto em sentenças limpas
            let sentencas = textoBruto.split('. ').filter(s => s.trim().length > 10);
            
            let introducao = sentencas.slice(0, 2).join('. ') + '.';
            let pontosChave = sentencas.slice(2, 6).map(s => `  • ${s.trim()}.`).join('\n');
            let aprofundamento = sentencas.slice(6, 10).join('. ') + (sentencas.length > 6 ? '.' : '');

            // Constrói a estrutura visual limpa e escaneável típica do ChatGPT
            let htmlSintetizado = `
<div class="gpt-section">
    <div class="gpt-header">📖 Análise Conceitual: ${titulo.toUpperCase()}</div>
    <p>${introducao}</p>
</div>

<div class="gpt-section">
    <div class="gpt-header">🎯 Tópicos e Variáveis Estruturais</div>
    <p>${pontosChave || '  • Detalhes adicionais integrados no escopo geral.'}</p>
</div>
            `;

            if(aprofundamento.length > 5) {
                htmlSintetizado += `
<div class="gpt-section">
    <div class="gpt-header">💡 Contexto e Desdobramentos</div>
    <p>${aprofundamento}</p>
</div>
                `;
            }

            return htmlSintetizado;
        }

        // EFEITO DE DIGITAÇÃO EM TEMPO REAL (Simula o Streaming de Tokens do ChatGPT)
        function renderizarTextoGradual(elemento, htmlCompleto, callback) {
            estaDigitando = true;
            let i = 0;
            elemento.innerHTML = "";
            
            // Cria um elemento temporário para ler as tags HTML sem quebrá-las na digitação
            let divAux = document.createElement('div');
            divAux.innerHTML = htmlCompleto;
            
            // Para não demorar uma eternidade em textos longos, vamos "digitar" blocos de caracteres
            let intervalo = setInterval(() => {
                if (i >= htmlCompleto.length) {
                    clearInterval(intervalo);
                    elemento.innerHTML = htmlCompleto; // Garante o HTML perfeito no fim
                    estaDigitando = false;
                    callback();
                } else {
                    // Avança o contador tratando blocos para fluidez visual
                    i += 8; 
                    elemento.innerHTML = htmlCompleto.substring(0, i) + " █";
                    const container = document.getElementById('chatContainer');
                    container.scrollTop = container.scrollHeight;
                }
            }, 15);
        }

        // ENVIO DE MENSAGEM COM FILTRO DE INTENÇÃO E APERFEIÇOAMENTO
        async function enviarMensagem() {
            if(estaDigitando) return;

            const input = document.getElementById('userInput');
            const textoOriginal = input.value.trim();
            if (!textoOriginal || !atualChatId) return;

            input.value = "";
            const chat = conversas.find(x => x.id === atualChatId);
            
            chat.mensagens.push({ role: 'user', texto: textoOriginal });
            renderizarMensagens();

            // Memória ativa
            const respostaMemoria = processarMemoria(textoOriginal);
            if (respostaMemoria) {
                const msgIndex = chat.mensagens.length;
                chat.mensagens.push({ role: 'bot', textos: [respostaMemoria], indexAtivo: 0 });
                renderizarMensagens();
                
                // Aplica efeito na memória também
                setTimeout(() => {
                    const box = document.querySelectorAll('.bot-message')[document.querySelectorAll('.bot-message').length - 1];
                    renderizarTextoGradual(box, respostaMemoria, () => { salvarDados(); });
                }, 50);
                return;
            }

            // Inicia o Estado de Pensamento Crítico
            const msgIndex = chat.mensagens.length;
            chat.mensagens.push({ role: 'bot', textos: ["<span class='thinking-status'>🧠 [Pensamento Crítico] Analisando intenção da pergunta...</span>"], indexAtivo: 0 });
            renderizarMensagens();

            // Limpeza de termos para focar no núcleo intelectual do assunto
            let assuntoNucleo = textoOriginal.toLowerCase().replace(/(me fale sobre|o que e|quem foi|explique|defina|sobre o|sobre a)/g, "").trim();
            if(!assuntoNucleo) assuntoNucleo = textoOriginal;

            // Atualiza status do pensamento antes da busca
            document.querySelectorAll('.bot-message')[document.querySelectorAll('.bot-message').length - 1].innerHTML = "<span class='thinking-status'>🌐 [Processamento] Varrendo base global de conhecimento e minerando dados...</span>";

            try {
                const url = `https://pt.wikipedia.org/w/api.php?action=query&origin=*&format=json&prop=extracts&explaintext=1&exchars=2500&generator=search&gsrsearch=${encodeURIComponent(assuntoNucleo)}&gsrlimit=3`;
                const resposta = await fetch(url);
                const dados = await resposta.json();

                let pacotesRespostas = [];

                if (dados.query && dados.query.pages) {
                    const paginas = dados.query.pages;
                    for (let id in paginas) {
                        if (paginas[id].extract && paginas[id].extract.length > 50) {
                            // Aplica a transformação intelectual no texto cru da internet
                            let estruturado = estruturarComoGPT(paginas[id].title, paginas[id].extract);
                            pacotesRespostas.push(estruturado);
                        }
                    }
                }

                if (pacotesRespostas.length === 0) {
                    pacotesRespostas.push(`<div class="gpt-section"><div class="gpt-header">❌ Escopo Não Mapeado</div>Não encontrei variáveis suficientes para estruturar uma análise inteligível sobre "${assuntoNucleo}". Tente reconfigurar a pergunta.</div>`);
                }

                chat.mensagens[msgIndex].textos = pacotesRespostas;

                if (chat.titulo === "Nova conversa" || chat.titulo === "Análise Intelectual") {
                    chat.titulo = assuntoNucleo.charAt(0).toUpperCase() + assuntoNucleo.slice(1);
                    renderizarAbasEListas();
                }

                // Dispara o renderizador gradual no balão correto
                setTimeout(() => {
                    const caixasBot = document.querySelectorAll('.bot-message');
                    const ultimaCaixa = caixasBot[caixasBot.length - 1];
                    renderizarTextoGradual(ultimaCaixa, pacotesRespostas[0], () => {
                        salvarDados();
                        renderizarMensagens(); // Re-renderiza para injetar os botões de controle sem quebrar o texto
                    });
                }, 50);

            } catch (e) {
                chat.mensagens[msgIndex].textos = ["<div class='gpt-section'>⚠️ Falha crítica no pipeline de dados. Redefina a conexão.</div>"];
                salvarDados();
                renderizarMensagens();
            }
        }

        function alternarResposta(msgIndex) {
            if(estaDigitando) return;
            const chat = conversas.find(x => x.id === atualChatId);
            const msg = chat.mensagens[msgIndex];
            msg.indexAtivo = (msg.indexAtivo + 1) % msg.textos.length;
            salvarDados();
            renderizarMensagens();
        }

        // RENDERS DE TELA
        function renderizarAbasEListas() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const abaEl = document.getElementById(`tab-${abaAtiva}`);
            if(abaEl) abaEl.classList.add('active');

            const container = document.getElementById('chatListContainer');
            container.innerHTML = "";

            if (abaAtiva === 'memoria') {
                if(memorias.length === 0) container.innerHTML = "<div style='font-size:12px;color:#8e8ea0;padding:10px;'>Sem registros indexados.</div>";
                memorias.forEach((m, idx) => {
                    container.innerHTML += `<div class="memory-item"><span>${m}</span><button class="action-btn" onclick="deletarMemoria(${idx})">❌</button></div>`;
                });
                return;
            }

            const filtradas = conversas.filter(x => x.status === abaAtiva);
            if(filtradas.length === 0) container.innerHTML = "<div style='font-size:12px;color:#8e8ea0;padding:10px;'>Vazio.</div>";

            filtradas.forEach(c => {
                const isActive = c.id === atualChatId ? 'active' : '';
                let botoesAcao = '';

                if (abaAtiva === 'ativas') {
                    botoesAcao = `
                        <button class="action-btn" onclick="renomearConversa('${c.id}', event)">✏️</button>
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'arquivadas', event)">📦</button>
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'lixeira', event)">🗑️</button>
                    `;
                } else if (abaAtiva === 'arquivadas') {
                    botoesAcao = `
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'ativas', event)">↩️</button>
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'lixeira', event)">🗑️</button>
                    `;
                } else if (abaAtiva === 'lixeira') {
                    botoesAcao = `
                        <button class="action-btn" onclick="alterarStatusConversa('${c.id}', 'ativas', event)">↩️</button>
                        <button class="action-btn" onclick="excluirPermanentemente('${c.id}', event)">❌</button>
                    `;
                }

                container.innerHTML += `
                    <div class="chat-item ${isActive}" onclick="selecionarConversa('${c.id}')">
                        <span class="chat-item-title">💬 ${c.titulo}</span>
                        <div class="chat-item-actions">${botoesAcao}</div>
                    </div>
                `;
            });
        }

        function renderizarMensagens() {
            const container = document.getElementById('chatContainer');
            
            // Se estiver no meio de uma digitação gradual, preservamos o estado visual para não travar o efeito
            if(estaDigitando) return; 

            container.innerHTML = "";

            if (!atualChatId) {
                container.innerHTML = "<div style='text-align:center;color:#8e8ea0;margin-top:50px;'>Inicie um escopo analítico na barra lateral.</div>";
                return;
            }

            const chat = conversas.find(x => x.id === atualChatId);
            if (!chat) return;

            chat.mensagens.forEach((msg, idx) => {
                const row = document.createElement('div');
                row.className = "message-row";

                if (msg.role === 'user') {
                    row.innerHTML = `<div class="message user-message"><b>Você:</b><br>${msg.texto}</div>`;
                } else {
                    const textoExibido = msg.textos[msg.indexAtivo];
                    const paginasContador = msg.textos.length > 1 ? `<span style="float:right;color:#19C37D;font-size:11px;background:#202123;padding:2px 6px;border-radius:4px;">Perspectiva Analítica ${msg.indexAtivo + 1} de ${msg.textos.length}</span>` : '';
                    
                    let htmlBot = `
                        <div class="message bot-message">
                            ${paginasContador}
                            <b>ChatGPT Intellect Mode:</b><br><br>${textoExibido}
                        </div>
                    `;

                    if (msg.textos.length > 1) {
                        htmlBot += `
                            <div class="regenerate-container">
                                <button class="btn-regenerate" onclick="alternarResposta(${idx})">🔄 Mudar Ângulo de Análise (Regenerar Contexto)</button>
                            </div>
                        `;
                    }
                    row.innerHTML = htmlBot;
                }
                container.appendChild(row);
            });

            container.scrollTop = container.scrollHeight;
        }

        function salvarDados() {
            localStorage.setItem('conversas', JSON.stringify(conversas));
            localStorage.setItem('memorias', JSON.stringify(memorias));
            localStorage.setItem('atualChatId', atualChatId);
        }

        function verificarTecla(event) {
            if (event.key === "Enter") {
                enviarMensagem();
            }
        }
    </script>
</body>
</html>
