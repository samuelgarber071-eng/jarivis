<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Estilo AIMP - Com Capas e Cores Dinâmicas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Biblioteca para extrair cores da imagem -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: {
                            dark: '#121418',
                            medium: '#1E2127',
                            light: '#2A2F38',
                            text: '#E8EDF2'
                        }
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'Roboto', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-thin {
                scrollbar-width: thin;
                scrollbar-color: var(--cor-accent) #121418;
            }
            .scrollbar-thin::-webkit-scrollbar {
                width: 6px;
            }
            .scrollbar-thin::-webkit-scrollbar-track {
                background: #121418;
            }
            .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: var(--cor-accent);
                border-radius: 3px;
                opacity: 0.7;
            }
            .scrollbar-thin::-webkit-scrollbar-thumb:hover {
                background-color: var(--cor-accent);
                opacity: 1;
            }
            .btn-hover {
                transition: all 0.2s ease;
            }
            .btn-hover:hover {
                transform: translateY(-1px);
                filter: brightness(1.15);
            }
            /* Variáveis dinâmicas */
            :root {
                --cor-accent: #2E86AB;
                --cor-accent-clara: #4298bd;
                --cor-accent-escura: #1f6885;
                --cor-texto: #E8EDF2;
                --cor-sombra: rgba(46, 134, 171, 0.25);
            }
            .bg-accent { background-color: var(--cor-accent); }
            .bg-accent-escura { background-color: var(--cor-accent-escura); }
            .bg-accent-clara { background-color: var(--cor-accent-clara); }
            .text-accent { color: var(--cor-accent); }
            .border-accent { border-color: var(--cor-accent); }
            .hover-accent:hover { color: var(--cor-accent); }
            .bg-accent-alpha { background-color: rgba(var(--cor-accent-rgb), 0.2); }
            .transition-cores {
                transition: background-color 0.6s ease, border-color 0.6s ease, color 0.6s ease, box-shadow 0.6s ease;
            }
        }
    </style>
</head>
<body class="bg-base-dark text-base-text h-screen flex flex-col overflow-hidden transition-cores">
    <!-- Cabeçalho -->
    <header class="bg-base-medium px-4 py-2 flex items-center justify-between border-b border-base-light transition-cores">
        <div class="flex items-center gap-2">
            <i class="fa fa-music text-accent text-xl"></i>
            <h1 class="text-lg font-semibold">Player AIMP Style</h1>
        </div>
        <div class="flex gap-2">
            <button id="btnBackup" class="btn-hover bg-accent px-3 py-1 rounded text-sm flex items-center gap-1 text-white">
                <i class="fa fa-download"></i> Backup
            </button>
            <button id="btnRestore" class="btn-hover bg-green-600 px-3 py-1 rounded text-sm flex items-center gap-1 text-white">
                <i class="fa fa-upload"></i> Restaurar
            </button>
            <input type="file" id="inputRestore" accept=".json" class="hidden">
        </div>
    </header>

    <!-- Área Principal -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Barra Lateral -->
        <aside class="w-64 bg-base-medium border-r border-base-light p-3 flex flex-col gap-4 transition-cores">
            <div>
                <h3 class="text-sm uppercase text-gray-400 mb-2 font-medium">Biblioteca</h3>
                <ul class="space-y-1">
                    <li class="flex items-center gap-2 p-2 rounded bg-accent-alpha cursor-pointer transition-cores" data-tab="playlist">
                        <i class="fa fa-list-ul"></i> Playlist
                    </li>
                    <li class="flex items-center gap-2 p-2 rounded hover:bg-base-light cursor-pointer transition-cores" data-tab="arquivos">
                        <i class="fa fa-folder-open"></i> Arquivos
                    </li>
                    <li class="flex items-center gap-2 p-2 rounded hover:bg-base-light cursor-pointer transition-cores" data-tab="lixeira">
                        <i class="fa fa-trash"></i> Lixeira
                    </li>
                </ul>
            </div>

            <!-- Área da Capa de Álbum -->
            <div class="mt-auto flex flex-col items-center gap-3 p-3 bg-base-light rounded-lg transition-cores shadow-lg">
                <div id="capaContainer" class="w-full aspect-square bg-base-medium rounded flex items-center justify-center overflow-hidden shadow-inner">
                    <img id="capaImagem" src="" alt="Capa do Álbum" class="w-full h-full object-cover hidden">
                    <i class="fa fa-music text-5xl text-gray-500"></i>
                </div>
                <p id="infoAlbum" class="text-xs text-center text-gray-400">Nenhuma música selecionada</p>
            </div>
        </aside>

        <!-- Conteúdo Central -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Área de Conteúdo Dinâmico -->
            <div id="conteudo" class="flex-1 p-4 overflow-y-auto scrollbar-thin">
                <!-- Playlist -->
                <div id="tab-playlist" class="tab-conteudo">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg font-semibold">Minha Playlist</h2>
                        <label for="arquivosMusica" class="cursor-pointer btn-hover bg-accent px-3 py-1 rounded text-sm text-white">
                            <i class="fa fa-plus mr-1"></i> Adicionar Músicas
                        </label>
                        <input type="file" id="arquivosMusica" accept=".mp3,.wav,.ogg,.flac,.m4a" multiple class="hidden">
                    </div>
                    <ul id="listaPlaylist" class="space-y-1">
                        <li class="text-gray-400 text-center py-10">Nenhuma música adicionada ainda</li>
                    </ul>
                </div>

                <!-- Arquivos -->
                <div id="tab-arquivos" class="tab-conteudo hidden">
                    <h2 class="text-lg font-semibold mb-3">Arquivos Carregados</h2>
                    <ul id="listaArquivos" class="space-y-1">
                        <li class="text-gray-400 text-center py-10">Nenhum arquivo disponível</li>
                    </ul>
                </div>

                <!-- Lixeira -->
                <div id="tab-lixeira" class="tab-conteudo hidden">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg font-semibold mb-3">Lixeira</h2>
                        <button id="esvaziarLixeira" class="btn-hover bg-red-600 px-3 py-1 rounded text-sm text-white">
                            Esvaziar Tudo
                        </button>
                    </div>
                    <ul id="listaLixeira" class="space-y-1">
                        <li class="text-gray-400 text-center py-10">Lixeira vazia</li>
                    </ul>
                </div>
            </div>

            <!-- Barra de Controles do Player -->
            <footer class="bg-base-medium border-t border-base-light p-4 transition-cores">
                <audio id="audioPlayer" preload="metadata">
                
                <div class="flex flex-col gap-3">
                    <div class="flex justify-between text-sm">
                        <span id="tituloAtual" class="font-medium">Nenhuma música selecionada</span>
                        <span id="tempoAtual">00:00 / 00:00</span>
                    </div>

                    <!-- Barra de Progresso -->
                    <div class="w-full h-2 bg-base-light rounded-full overflow-hidden cursor-pointer transition-cores" id="barraProgresso">
                        <div id="progresso" class="h-full bg-accent rounded-full w-0 transition-all duration-150"></div>
                    </div>

                    <!-- Controles Principais -->
                    <div class="flex items-center justify-center gap-6">
                        <button id="btnAnterior" class="text-2xl hover-accent btn-hover transition-colors">
                            <i class="fa fa-step-backward"></i>
                        </button>
                        <button id="btnPlay" class="text-4xl text-accent hover:brightness-110 btn-hover">
                            <i class="fa fa-play-circle"></i>
                        </button>
                        <button id="btnProximo" class="text-2xl hover-accent btn-hover transition-colors">
                            <i class="fa fa-step-forward"></i>
                        </button>
                        <div class="flex items-center gap-2 ml-6">
                            <i class="fa fa-volume-up"></i>
                            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" class="w-28 accent-accent">
                        </div>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
    <script>
        // Variáveis Globais
        const audioPlayer = document.getElementById('audioPlayer');
        const arquivosMusica = document.getElementById('arquivosMusica');
        const listaPlaylist = document.getElementById('listaPlaylist');
        const listaArquivos = document.getElementById('listaArquivos');
        const listaLixeira = document.getElementById('listaLixeira');
        const btnPlay = document.getElementById('btnPlay');
        const btnAnterior = document.getElementById('btnAnterior');
        const btnProximo = document.getElementById('btnProximo');
        const tituloAtual = document.getElementById('tituloAtual');
        const tempoAtual = document.getElementById('tempoAtual');
        const barraProgresso = document.getElementById('barraProgresso');
        const progresso = document.getElementById('progresso');
        const volume = document.getElementById('volume');
        const btnBackup = document.getElementById('btnBackup');
        const btnRestore = document.getElementById('btnRestore');
        const inputRestore = document.getElementById('inputRestore');
        const esvaziarLixeira = document.getElementById('esvaziarLixeira');
        const capaImagem = document.getElementById('capaImagem');
        const infoAlbum = document.getElementById('infoAlbum');
        const colorThief = new ColorThief();

        let playlist = JSON.parse(localStorage.getItem('playlist')) || [];
        let lixeira = JSON.parse(localStorage.getItem('lixeira')) || [];
        let indiceAtual = 0;

        // Funções Auxiliares
        function formatarTempo(segundos) {
            const min = Math.floor(segundos / 60);
            const seg = Math.floor(segundos % 60);
            return `${min.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;
        }

        function salvarDados() {
            localStorage.setItem('playlist', JSON.stringify(playlist));
            localStorage.setItem('lixeira', JSON.stringify(lixeira));
        }

        // Extrair metadados e capa do arquivo
        function lerMetadados(arquivo, callback) {
            jsmediatags.read(arquivo, {
                onSuccess: function(tag) {
                    let capa = null;
                    if (tag.tags.picture) {
                        const data = tag.tags.picture.data;
                        const format = tag.tags.picture.format;
                        let base64String = "";
                        for (let i = 0; i < data.length; i++) {
                            base64String += String.fromCharCode(data[i]);
                        }
                        capa = `data:${format};base64,${window.btoa(base64String)}`;
                    }
                    const titulo = tag.tags.title || arquivo.name.replace(/\.[^/.]+$/, "");
                    const artista = tag.tags.artist || "Artista Desconhecido";
                    const album = tag.tags.album || "Álbum Desconhecido";
                    callback({ titulo, artista, album, capa });
                },
                onError: function() {
                    callback({
                        titulo: arquivo.name.replace(/\.[^/.]+$/, ""),
                        artista: "Artista Desconhecido",
                        album: "Álbum Desconhecido",
                        capa: null
                    });
                }
            });
        }

        // Extrair cor predominante da capa e aplicar no tema
        function aplicarCoresDaCapa(urlImagem) {
            if (!urlImagem) {
                resetarCores();
                return;
            }
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                try {
                    const cor = colorThief.getColor(img);
                    const [r, g, b] = cor;
                    const brilho = (r * 299 + g * 587 + b * 114) / 1000;
                    
                    // Ajusta cor para ficar visível no fundo escuro
                    const fator = brilho < 120 ? 1.5 : 0.8;
                    const nr = Math.min(255, Math.round(r * fator));
                    const ng = Math.min(255, Math.round(g * fator));
                    const nb = Math.min(255, Math.round(b * fator));

                    document.documentElement.style.setProperty('--cor-accent', `rgb(${nr}, ${ng}, ${nb})`);
                    document.documentElement.style.setProperty('--cor-accent-rgb', `${nr}, ${ng}, ${nb}`);
                    document.documentElement.style.setProperty('--cor-accent-escura', `rgb(${Math.max(0, nr-40)}, ${Math.max(0, ng-40)}, ${Math.max(0, nb-40)})`);
                    document.documentElement.style.setProperty('--cor-accent-clara', `rgb(${Math.min(255, nr+30)}, ${Math.min(255, ng+30)}, ${Math.min(255, nb+30)})`);
                } catch (e) {
                    resetarCores();
                }
            };
            img.onerror = resetarCores;
            img.src = urlImagem;
        }

        function resetarCores() {
            document.documentElement.style.setProperty('--cor-accent', '#2E86AB');
            document.documentElement.style.setProperty('--cor-accent-rgb', '46, 134, 171');
            document.documentElement.style.setProperty('--cor-accent-escura', '#1f6885');
            document.documentElement.style.setProperty('--cor-accent-clara', '#4298bd');
        }

        function renderizarPlaylist() {
            listaPlaylist.innerHTML = playlist.length ? '' : '<li class="text-gray-400 text-center py-10">Nenhuma música adicionada ainda</li>';
            playlist.forEach((musica, i) => {
                const li = document.createElement('li');
                li.className = `p-3 rounded flex justify-between items-center cursor-pointer hover:bg-base-light transition-cores ${i === indiceAtual ? 'bg-accent-alpha' : ''}`;
                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1" onclick="tocarMusica(${i})">
                        <div class="w-10 h-10 rounded bg-base-medium flex items-center justify-center overflow-hidden">
                            ${musica.capa ? `<img src="${musica.capa}" class="w-full h-full object-cover">` : `<i class="fa fa-music text-gray-500"></i>`}
                        </div>
                        <div class="overflow-hidden">
                            <p class="font-medium truncate">${musica.titulo}</p>
                            <p class="text-xs text-gray-400 truncate">${musica.artista} • ${musica.album}</p>
                        </div>
                    </div>
                    <button onclick="moverParaLixeira(${i})" class="text-red-500 hover:text-red-400 text-lg">
                        <i class="fa fa-trash-o"></i>
                    </button>
                `;
                listaPlaylist.appendChild(li);
            });
            salvarDados();
        }

        function renderizarLixeira() {
            listaLixeira.innerHTML = lixeira.length ? '' : '<li class="text-gray-400 text-center py-10">Lixeira vazia</li>';
            lixeira.forEach((musica, i) => {
                const li = document.createElement('li');
                li.className = 'p-3 rounded flex justify-between items-center hover:bg-base-light transition-cores';
                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1">
                        <div class="w-9 h-9 rounded bg-base-medium flex items-center justify-center overflow-hidden">
                            ${musica.capa ? `<img src="${musica.capa}" class="w-full h-full object-cover">` : `<i class="fa fa-music text-gray-500"></i>`}
                        </div>
                        <div>
                            <p class="font-medium">${musica.titulo}</p>
                            <p class="text-xs text-gray-400">${musica.artista}</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="restaurarDaLixeira(${i})" class="text-green-500 hover:text-green-400 text-lg">
                            <i class="fa fa-undo"></i>
                        </button>
                        <button onclick="excluirDefinitivamente(${i})" class="text-red-500 hover:text-red-400 text-lg">
                            <i class="fa fa-times"></i>
                        </button>
                    </div>
                `;
                listaLixeira.appendChild(li);
            });
            salvarDados();
        }

        function tocarMusica(indice) {
            if (!playlist[indice]) return;
            indiceAtual = indice;
            const musica = playlist[indice];
            
            audioPlayer.src = musica.url;
            tituloAtual.textContent = `${musica.titulo} - ${musica.artista}`;
            infoAlbum.textContent = `${musica.artista} • ${musica.album}`;
            
            // Atualizar capa
            if (musica.capa) {
                capaImagem.src = musica.capa;
                capaImagem.classList.remove('hidden');
                document.querySelector('#capaContainer > i').classList.add('hidden');
                aplicarCoresDaCapa(musica.capa);
            } else {
                capaImagem.classList.add('hidden');
                document.querySelector('#capaContainer > i').classList.remove('hidden');
                resetarCores();
            }

            audioPlayer.play();
            btnPlay.innerHTML = '<i class="fa fa-pause-circle"></i>';
            renderizarPlaylist();
        }

        function moverParaLixeira(indice) {
            const removida = playlist.splice(indice, 1)[0];
            lixeira.push(removida);
            if (indice === indiceAtual) {
                audioPlayer.pause();
                tituloAtual.textContent = 'Nenhuma música selecionada';
                infoAlbum.textContent = '';
                capaImagem.classList.add('hidden');
                document.querySelector('#capaContainer > i').classList.remove('hidden');
                btnPlay.innerHTML = '<i class="fa fa-play-circle"></i>';
                resetarCores();
            }
            renderizarPlaylist();
            renderizarLixeira();
        }

        function restaurarDaLixeira(indice) {
            const restaurada = lixeira.splice(indice, 1)[0];
            playlist.push(restaurada);
            renderizarPlaylist();
            renderizarLixeira();
        }

        function excluirDefinitivamente(indice) {
            lixeira.splice(indice, 1);
            renderizarLixeira();
        }

        // Eventos
        arquivosMusica.addEventListener('change', (e) => {
            const arquivos = e.target.files;
            Array.from(arquivos).forEach(arquivo => {
                const url = URL.createObjectURL(arquivo);
                lerMetadados(arquivo, dados => {
                    playlist.push({
                        url: url,
                        titulo: dados.titulo,
                        artista: dados.artista,
                        album: dados.album,
                        capa: dados.capa
                    });
                    renderizarPlaylist();
                });
            });
        });

        btnPlay.addEventListener('click', () => {
            if (playlist.length === 0) return;
            if (audioPlayer.paused) {
                audioPlayer.play();
                btnPlay.innerHTML = '<i class="fa fa-pause-circle"></i>';
            } else {
                audioPlayer.pause();
                btnPlay.innerHTML = '<i class="fa fa-play-circle"></i>';
            }
        });

        btnAnterior.addEventListener('click', () => {
            if (playlist.length === 0) return;
            indiceAtual = (indiceAtual - 1 + playlist.length) % playlist.length;
            tocarMusica(indiceAtual);
        });

        btnProximo.addEventListener('click', () => {
            if (playlist.length === 0) return;
            indiceAtual = (indiceAtual + 1) % playlist.length;
            tocarMusica(indiceAtual);
        });

        audioPlayer.addEventListener('timeupdate', () => {
            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100 || 0;
            progresso.style.width = `${percent}%`;
            tempoAtual.textContent = `${formatarTempo(audioPlayer.currentTime)} / ${formatarTempo(audioPlayer.duration || 0)}`;
        });

        audioPlayer.addEventListener('ended', () => btnProximo.click());

        barraProgresso.addEventListener('click', (e) => {
            const largura = barraProgresso.clientWidth;
            const posicao = e.offsetX;
            const tempo = (posicao / largura) * audioPlayer.duration;
            if (!isNaN(tempo)) audioPlayer.currentTime = tempo;
        });

        volume.addEventListener('input', () => audioPlayer.volume = volume.value);

        // Navegação entre abas
        document.querySelectorAll('[data-tab]').forEach(aba => {
            aba.addEventListener('click', () => {
                document.querySelectorAll('.tab-conteudo').forEach(t => t.classList.add('hidden'));
                document.getElementById(`tab-${aba.dataset.tab}`).classList.remove('hidden');
                document.querySelectorAll('[data-tab]').forEach(a => a.classList.remove('bg-accent-alpha'));
                aba.classList.add('bg-accent-alpha');
            });
        });

        // Sistema de Backup
        btnBackup.addEventListener('click', () => {
            const dados = { playlist, lixeira };
            const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup-player-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        btnRestore.addEventListener('click', () => inputRestore.click());
        inputRestore.addEventListener('change', (e) => {
            const arquivo = e.target.files[0];
            if (!arquivo) return;
            const leitor = new FileReader();
            leitor.onload = (evt) => {
                try {
                    const dados = JSON.parse(evt.target.result);
                    playlist = dados.playlist || [];
                    lixeira = dados.lixeira || [];
                    renderizarPlaylist();
                    renderizarLixeira();
                    alert('Backup restaurado com sucesso!');
                } catch {
                    alert('Arquivo de backup inválido!');
                }
            };
            leitor.readAsText(arquivo);
        });

        esvaziarLixeira.addEventListener('click', () => {
            if (confirm('Deseja esvaziar a lixeira definitivamente?')) {
                lixeira = [];
                renderizarLixeira();
            }
        });

        // Inicialização
        renderizarPlaylist();
        renderizarLixeira();
    </script>
</body>
</html>
