<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibePlayer Pro - Sidebar Edition</title>
    <style>
        :root {
            --bg-sidebar: rgba(20, 20, 28, 0.75);
            --bg-main: rgba(30, 30, 42, 0.4);
            --accent: #ff6b00; 
            --text: #f5f5fa;
            --text-muted: #a0a0ba;
            --dynamic-color-1: #1a1a24;
            --dynamic-color-2: #0d0d13;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, var(--dynamic-color-1), var(--dynamic-color-2));
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            transition: background 1s ease;
            overflow: hidden;
        }

        /* Container Principal em Layout de Sidebar */
        .player-container {
            width: 100%;
            max-width: 780px;
            height: 520px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            overflow: hidden;
            display: table;
            table-layout: fixed;
            transition: box-shadow 0.5s ease;
        }

        /* Sidebar - Lista de Músicas e Playlists */
        .sidebar {
            display: table-cell;
            width: 340px;
            background: var(--bg-sidebar);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: top;
            height: 100%;
        }

        .sidebar-wrapper {
            display: block;
            height: 520px;
            position: relative;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .playlist-selector-zone {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 5px;
        }

        select { 
            background: rgba(255, 255, 255, 0.06); 
            color: var(--text); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 6px 10px; 
            font-size: 12px; 
            flex-grow: 1; 
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        /* Lista de Músicas Scroll */
        .playlist { 
            list-style: none; 
            overflow-y: auto; 
            height: 290px;
            background: rgba(0,0,0,0.05); 
        }
        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }

        .playlist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 13px;
            user-select: none;
            transition: background 0.2s;
        }
        .playlist-item:hover { background: rgba(255, 255, 255, 0.03); }
        .playlist-item.active { background: rgba(255, 255, 255, 0.06); border-left: 4px solid var(--accent); }

        .item-info { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; padding-right: 10px; }
        .item-controls { display: flex; gap: 6px; opacity: 0.1; transition: opacity 0.2s; }
        .playlist-item:hover .item-controls { opacity: 1; }

        .sidebar-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.2);
        }

        /* Área Principal - Player e Capa */
        .main-content {
            display: table-cell;
            background: var(--bg-main);
            vertical-align: middle;
            text-align: center;
            padding: 30px;
            height: 100%;
        }

        /* Seção Visual Central (Capa) */
        .artwork-zone {
            display: block;
            margin: 0 auto;
        }

        .cover-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px auto;
        }

        .cover-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        .music-cover, #generated-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Botão Flutuante para Trocar Capa */
        .change-cover-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            opacity: 0;
        }
        .cover-container:hover .change-cover-btn {
            opacity: 1;
        }
        .change-cover-btn:hover {
            transform: scale(1.1);
            background: var(--accent);
            border-color: transparent;
        }

        .track-title {
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
            margin-bottom: 4px;
            margin-top: 10px;
        }

        .playlist-name-current {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* Controles customizados de Áudio */
        .custom-controls {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
        }

        .progress-area {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 6px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 10px;
            position: relative;
        }
        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .playback-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        .control-btn:hover { background: rgba(255,255,255,0.08); color: var(--accent); }
        .control-btn.play-pause {
            font-size: 20px;
            width: 50px;
            height: 50px;
            background: var(--text);
            color: #14141c;
        }
        .control-btn.play-pause:hover {
            transform: scale(1.05);
            background: var(--accent);
            color: #fff;
        }

        .volume-zone {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 12px;
            margin: 15px auto 0 auto;
            font-size: 12px;
            max-width: 200px;
        }
        .volume-slider {
            flex-grow: 1;
            accent-color: var(--accent);
            cursor: pointer;
            height: 4px;
        }

        /* Elementos utilitários */
        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.12); border-color: var(--accent); }
        .btn-accent { background: var(--accent); color: #fff; font-weight: bold; border: none; flex-grow: 1; padding: 10px; border-radius: 8px; }
        .btn-accent:hover { background: #e05e00; }

        .file-controls { display: flex; gap: 6px; padding: 12px 20px; }
        input[type="file"] { display: none; }

        .playlist-actions {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0,0,0,0.1);
            font-size: 11px;
            border-top: 1px solid rgba(255,255,255,0.03);
        }
        .action-link { color: var(--text-muted); cursor: pointer; user-select: none; transition: color 0.2s;}
        .action-link:hover { color: var(--accent); }

        .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px; }
        .icon-btn:hover { color: var(--accent); }
        
        #import-status { font-size: 11px; color: #fff; text-align: center; padding: 6px; display: none; background: var(--accent); }
    </style>
</head>
<body>

<div class="player-container" id="player-container">
    
    <div class="sidebar">
        <div class="sidebar-wrapper">
            <div class="sidebar-header">
                <span style="font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted);">Playlists</span>
                <div class="playlist-selector-zone">
                    <select id="select-playlist"></select>
                    <button class="btn" id="btn-add-playlist" title="Nova Playlist">＋</button>
                    <button class="btn" id="btn-ren-playlist" title="Renomear">✏️</button>
                    <button class="btn" id="btn-del-playlist" style="color:#ff4444;" title="Deletar">🗑️</button>
                </div>
            </div>

            <ul class="playlist" id="playlist-container"></ul>

            <div class="sidebar-footer">
                <div class="file-controls">
                    <label class="btn btn-accent" style="text-align:center;" for="file-upload">＋ Adicionar Músicas</label>
                    <input type="file" id="file-upload" accept="audio/*" multiple>
                    <button class="btn" id="btn-clear-all">Limpar Tudo</button>
                </div>

                <div id="import-status">Processando Backup... Aguarde.</div>

                <div class="playlist-actions">
                    <span class="action-link" id="sort-az">🔤 A-Z</span>
                    <span class="action-link" id="btn-export">📤 Exportar</span>
                    <label class="action-link" for="input-import">📥 Importar</label>
                    <input type="file" id="input-import" accept=".json" style="display:none;">
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="artwork-zone">
            <div class="cover-container">
                <div class="cover-wrapper">
                    <img id="custom-cover-img" class="music-cover" style="display: none;" alt="Capa da música">
                    <canvas id="generated-cover" width="200" height="200"></canvas>
                </div>
                <label class="change-cover-btn" for="cover-upload" title="Mudar Capa da Música">📷</label>
                <input type="file" id="cover-upload" accept="image/*">
            </div>
            
            <div class="track-title" id="current-title">Nenhuma música tocando</div>
            <div class="playlist-name-current" id="current-playlist-badge">VIBEPLAYER</div>
        </div>

        <audio id="audio-player"></audio>

        <div class="custom-controls">
            <div class="progress-area" id="progress-area">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="time-labels">
                <span id="time-current">0:00</span>
                <span id="time-duration">0:00</span>
            </div>
            
            <div class="playback-buttons">
                <button class="control-btn" id="ctrl-prev" title="Anterior">⏮</button>
                <button class="control-btn play-pause" id="ctrl-play" title="Play/Pause">▶</button>
                <button class="control-btn" id="ctrl-next" title="Próxima">⏭</button>
            </div>

            <div class="volume-zone">
                <span id="volume-icon">🔊</span>
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
                <span id="volume-label" style="width: 32px; text-align: right;">80%</span>
            </div>
        </div>
    </div>

</div>

<script>
    const DB_NAME = 'LitePlayerProDB';
    const DB_VERSION = 3; // Versão incrementada para suportar a propriedade "cover" nas tracks
    let db;

    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains('playlists')) {
            db.createObjectStore('playlists', { keyPath: 'id', autoIncrement: true });
        }
        if (!db.objectStoreNames.contains('tracks')) {
            db.createObjectStore('tracks', { keyPath: 'id', autoIncrement: true });
        }
    };
    request.onsuccess = (e) => { db = e.target.result; checkAndLoadPlaylists(); initVolume(); generateDefaultCover("Vibe"); };

    const audioPlayer = document.getElementById('audio-player');
    const currentTitle = document.getElementById('current-title');
    const currentPlaylistBadge = document.getElementById('current-playlist-badge');
    const fileUpload = document.getElementById('file-upload');
    const coverUpload = document.getElementById('cover-upload');
    const customCoverImg = document.getElementById('custom-cover-img');
    const playlistContainer = document.getElementById('playlist-container');
    const selectPlaylist = document.getElementById('select-playlist');
    const inputImport = document.getElementById('input-import');
    const importStatus = document.getElementById('import-status');
    const volumeSlider = document.getElementById('volume-slider');
    const volumeLabel = document.getElementById('volume-label');
    const volumeIcon = document.getElementById('volume-icon');
    
    // Controles
    const ctrlPlay = document.getElementById('ctrl-play');
    const ctrlPrev = document.getElementById('ctrl-prev');
    const ctrlNext = document.getElementById('ctrl-next');
    const progressBar = document.getElementById('progress-bar');
    const progressArea = document.getElementById('progress-area');
    const timeCurrent = document.getElementById('time-current');
    const timeDuration = document.getElementById('time-duration');
    const coverCanvas = document.getElementById('generated-cover');

    let activePlaylistId = null;
    let playlistInMemory = [];
    let currentTrackId = null;
    let currentObjectURL = null;

    // Gerador de Capas Aleatórias com Paleta Inteligente
    function generateDefaultCover(seedText) {
        customCoverImg.style.display = 'none';
        coverCanvas.style.display = 'block';
        const ctx = coverCanvas.getContext('2d');
        
        let hash = 0;
        for (let i = 0; i < seedText.length; i++) {
            hash = seedText.charCodeAt(i) + ((hash << 5) - hash);
        }
        
        const h1 = Math.abs(hash % 360);
        const h2 = (h1 + 120) % 360;
        
        const color1 = `hsl(${h1}, 65%, 45%)`;
        const color2 = `hsl(${h2}, 70%, 20%)`;
        const colorAccent = `hsl(${h1}, 95%, 50%)`;

        updateInterfaceColors(h1, h2, colorAccent);

        const grad = ctx.createLinearGradient(0, 0, 200, 200);
        grad.addColorStop(0, color1);
        grad.addColorStop(1, color2);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 200, 200);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.beginPath();
        ctx.arc(100, 100, 70, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
        ctx.font = 'bold 65px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(seedText.charAt(0).toUpperCase(), 100, 100);
    }

    // Atualiza a interface cromática baseada na imagem ou paleta gerada
    function updateInterfaceColors(h1, h2, accentColor) {
        document.documentElement.style.setProperty('--dynamic-color-1', `hsl(${h1}, 35%, 12%)`);
        document.documentElement.style.setProperty('--dynamic-color-2', `hsl(${h2}, 35%, 7%)`);
        document.documentElement.style.setProperty('--accent', accentColor);
        document.getElementById('player-container').style.boxShadow = `0 25px 60px rgba(${h1%50}, ${h2%50}, 40, 0.45)`;
    }

    // Altera cores de forma dinâmica e interativa ao subir uma imagem
    function updateColorsFromImage() {
        const r = Math.floor(Math.random() * 360);
        updateInterfaceColors(r, (r + 120) % 360, `hsl(${r}, 95%, 55%)`);
    }

    // Evento para trocar a capa da música atual
    coverUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!currentTrackId) {
            alert("Toque uma música primeiro para conseguir alterar a capa dela!");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(evt) {
            const base64Image = evt.target.result;
            
            // Salvar no IndexedDB na música ativa no momento
            const tx = db.transaction('tracks', 'readwrite');
            const store = tx.objectStore('tracks');
            store.get(currentTrackId).onsuccess = (ev) => {
                const track = ev.target.result;
                if (track) {
                    track.cover = base64Image;
                    store.put(track).onsuccess = () => {
                        // Atualizar exibição imediatamente na tela
                        coverCanvas.style.display = 'none';
                        customCoverImg.src = base64Image;
                        customCoverImg.style.display = 'block';
                        updateColorsFromImage();
                    };
                }
            };
        };
        reader.readAsDataURL(file);
    });

    function initVolume() {
        const savedVolume = localStorage.getItem('player-volume');
        if (savedVolume !== null) {
            audioPlayer.volume = parseFloat(savedVolume);
            volumeSlider.value = savedVolume;
            updateVolumeUI(parseFloat(savedVolume));
        }
        volumeSlider.addEventListener('input', (e) => {
            const vol = parseFloat(e.target.value);
            audioPlayer.volume = vol;
            localStorage.setItem('player-volume', vol);
            updateVolumeUI(vol);
        });
    }

    function updateVolumeUI(vol) {
        volumeLabel.textContent = `${Math.round(vol * 100)}%`;
        if (vol === 0) volumeIcon.textContent = '🔇';
        else if (vol < 0.4) volumeIcon.textContent = '🔈';
        else if (vol < 0.7) volumeIcon.textContent = '🔉';
        else volumeIcon.textContent = '🔊';
    }

    ctrlPlay.addEventListener('click', () => {
        if (!audioPlayer.src) {
            if (playlistInMemory.length > 0) playTrack(playlistInMemory[0].id);
            return;
        }
        if (audioPlayer.paused) audioPlayer.play();
        else audioPlayer.pause();
    });

    audioPlayer.addEventListener('play', () => { ctrlPlay.textContent = '⏸'; });
    audioPlayer.addEventListener('pause', () => { ctrlPlay.textContent = '▶'; });

    audioPlayer.addEventListener('timeupdate', () => {
        if (!audioPlayer.duration) return;
        const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        progressBar.style.width = `${percent}%`;
        timeCurrent.textContent = formatTime(audioPlayer.currentTime);
    });

    audioPlayer.addEventListener('loadedmetadata', () => {
        timeDuration.textContent = formatTime(audioPlayer.duration);
    });

    progressArea.addEventListener('click', (e) => {
        if (!audioPlayer.duration) return;
        const rect = progressArea.getBoundingClientRect();
        audioPlayer.currentTime = ((e.clientX - rect.left) / rect.width) * audioPlayer.duration;
    });

    ctrlNext.addEventListener('click', () => {
        const currentIndex = playlistInMemory.findIndex(t => t.id === currentTrackId);
        if (currentIndex !== -1 && currentIndex + 1 < playlistInMemory.length) {
            playTrack(playlistInMemory[currentIndex + 1].id);
        }
    });

    ctrlPrev.addEventListener('click', () => {
        const currentIndex = playlistInMemory.findIndex(t => t.id === currentTrackId);
        if (currentIndex > 0) {
            playTrack(playlistInMemory[currentIndex - 1].id);
        }
    });

    function formatTime(secs) {
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function checkAndLoadPlaylists() {
        const tx = db.transaction('playlists', 'readonly');
        tx.objectStore('playlists').getAll().onsuccess = (e) => {
            const lists = e.target.result;
            if (lists.length === 0) {
                db.transaction('playlists', 'readwrite').objectStore('playlists').add({ name: "Minha Playlist" }).onsuccess = (ev) => {
                    activePlaylistId = ev.target.result;
                    renderPlaylistSelect();
                };
            } else {
                activePlaylistId = lists[0].id;
                renderPlaylistSelect();
            }
        };
    }

    function renderPlaylistSelect() {
        const tx = db.transaction('playlists', 'readonly');
        tx.objectStore('playlists').getAll().onsuccess = (e) => {
            selectPlaylist.innerHTML = '';
            e.target.result.forEach(list => {
                const opt = document.createElement('option');
                opt.value = list.id;
                opt.textContent = list.name;
                if (list.id === activePlaylistId) {
                    opt.selected = true;
                    currentPlaylistBadge.textContent = list.name;
                }
                selectPlaylist.appendChild(opt);
            });
            loadTracks();
        };
    }

    selectPlaylist.addEventListener('change', (e) => {
        activePlaylistId = parseInt(e.target.value);
        currentPlaylistBadge.textContent = selectPlaylist.options[selectPlaylist.selectedIndex].text;
        loadTracks();
    });

    document.getElementById('btn-add-playlist').addEventListener('click', () => {
        const name = prompt("Nome da nova playlist:");
        if (name && name.trim() !== "") {
            db.transaction('playlists', 'readwrite').objectStore('playlists').add({ name: name.trim() }).onsuccess = (e) => {
                activePlaylistId = e.target.result;
                renderPlaylistSelect();
            };
        }
    });

    document.getElementById('btn-ren-playlist').addEventListener('click', () => {
        const tx = db.transaction('playlists', 'readwrite');
        const store = tx.objectStore('playlists');
        store.get(activePlaylistId).onsuccess = (e) => {
            const list = e.target.result;
            const newName = prompt("Renomear playlist para:", list.name);
            if (newName && newName.trim() !== "") {
                list.name = newName.trim();
                store.put(list).onsuccess = () => renderPlaylistSelect();
            }
        };
    });

    document.getElementById('btn-del-playlist').addEventListener('click', () => {
        if (confirm("Excluir esta playlist inteira?")) {
            db.transaction('playlists', 'readwrite').objectStore('playlists').delete(activePlaylistId);
            const txT = db.transaction('tracks', 'readwrite');
            playlistInMemory.forEach(track => txT.objectStore('tracks').delete(track.id));
            txT.oncomplete = () => { checkAndLoadPlaylists(); };
        }
    });

    function loadTracks() {
        db.transaction('tracks', 'readonly').objectStore('tracks').getAll().onsuccess = (e) => {
            playlistInMemory = e.target.result
                .filter(track => track.playlistId === activePlaylistId)
                .sort((a, b) => a.order - b.order);
            renderTracksDOM();
        };
    }

    function renderTracksDOM() {
        playlistContainer.innerHTML = '';
        playlistInMemory.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `playlist-item ${track.id === currentTrackId ? 'active' : ''}`;
            li.innerHTML = `
                <div class="item-info" onclick="playTrack(${track.id})">
                    <span>${index + 1}. ${track.name}</span>
                </div>
                <div class="item-controls">
                    <button class="icon-btn" onclick="moveTrack(${track.id}, -1)">▲</button>
                    <button class="icon-btn" onclick="moveTrack(${track.id}, 1)">▼</button>
                    <button class="icon-btn" onclick="renameTrack(${track.id})">✏️</button>
                    <button class="icon-btn" onclick="deleteTrack(${track.id})">🗑️</button>
                </div>
            `;
            playlistContainer.appendChild(li);
        });
    }

    fileUpload.addEventListener('change', (e) => {
        const files = e.target.files;
        const tx = db.transaction('tracks', 'readwrite');
        const store = tx.objectStore('tracks');
        let currentMaxOrder = playlistInMemory.length;

        for (let file of files) {
            const track = {
                playlistId: activePlaylistId,
                name: file.name.replace(/\.[^/.]+$/, ""),
                fileData: file, 
                order: currentMaxOrder++,
                cover: null
            };
            store.add(track);
        }
        tx.oncomplete = () => { loadTracks(); };
    });

    function playTrack(id) {
        const track = playlistInMemory.find(t => t.id === id);
        if (!track) return;
        if (currentObjectURL) { URL.revokeObjectURL(currentObjectURL); }
        currentTrackId = id;
        currentObjectURL = URL.createObjectURL(track.fileData);
        audioPlayer.src = currentObjectURL;
        currentTitle.textContent = track.name;
        
        // Renderiza a capa salva se houver, senão gera a dinâmica abstrata
        if (track.cover) {
            coverCanvas.style.display = 'none';
            customCoverImg.src = track.cover;
            customCoverImg.style.display = 'block';
            updateColorsFromImage();
        } else {
            generateDefaultCover(track.name);
        }

        audioPlayer.play();
        renderTracksDOM();
    }

    audioPlayer.addEventListener('ended', () => {
        const currentIndex = playlistInMemory.findIndex(t => t.id === currentTrackId);
        if (currentIndex !== -1 && currentIndex + 1 < playlistInMemory.length) {
            playTrack(playlistInMemory[currentIndex + 1].id);
        }
    });

    document.getElementById('sort-az').addEventListener('click', () => {
        if (playlistInMemory.length === 0) return;
        playlistInMemory.sort((a, b) => a.name.localeCompare(b.name, 'pt', { sensitivity: 'base' }));
        const tx = db.transaction('tracks', 'readwrite');
        playlistInMemory.forEach((track, index) => {
            track.order = index;
            tx.objectStore('tracks').put(track); 
        });
        tx.oncomplete = () => { loadTracks(); };
    });

    window.moveTrack = function(id, direction) {
        const index = playlistInMemory.findIndex(t => t.id === id);
        const targetIndex = index + direction;
        if (targetIndex >= 0 && targetIndex < playlistInMemory.length) {
            const tx = db.transaction('tracks', 'readwrite');
            const tempOrder = playlistInMemory[index].order;
            playlistInMemory[index].order = playlistInMemory[targetIndex].order;
            playlistInMemory[targetIndex].order = tempOrder;
            tx.objectStore('tracks').put(playlistInMemory[index]);
            tx.objectStore('tracks').put(playlistInMemory[targetIndex]);
            tx.oncomplete = () => loadTracks();
        }
    };

    window.renameTrack = function(id) {
        const track = playlistInMemory.find(t => t.id === id);
        const newName = prompt("Renomear faixa para:", track.name);
        if (newName && newName.trim() !== "") {
            const tx = db.transaction('tracks', 'readwrite');
            track.name = newName.trim();
            tx.objectStore('tracks').put(track);
            tx.oncomplete = () => {
                if (currentTrackId === id) currentTitle.textContent = track.name;
                renderTracksDOM();
            };
        }
    };

    window.deleteTrack = function(id) {
        if(confirm("Excluir esta música?")) {
            const tx = db.transaction('tracks', 'readwrite');
            tx.objectStore('tracks').delete(id);
            tx.oncomplete = () => {
                if (currentTrackId === id) {
                    audioPlayer.src = '';
                    currentTitle.textContent = "Nenhuma música tocando";
                    generateDefaultCover("Vibe");
                }
                loadTracks();
            };
        }
    };

    document.getElementById('btn-clear-all').addEventListener('click', () => {
        if(confirm("Apagar completamente TODOS os dados do aplicativo?")) {
            indexedDB.deleteDatabase(DB_NAME);
            localStorage.removeItem('player-volume');
            location.reload();
        }
    });

    document.getElementById('btn-export').addEventListener('click', async () => {
        importStatus.textContent = "A exportar dados, capas e áudios... Aguarde.";
        importStatus.style.display = "block";

        const backup = { playlists: [], tracks: [] };
        backup.playlists = await new Promise((res) => {
            db.transaction('playlists', 'readonly').objectStore('playlists').getAll().onsuccess = (e) => res(e.target.result);
        });
        const rawTracks = await new Promise((res) => {
            db.transaction('tracks', 'readonly').objectStore('tracks').getAll().onsuccess = (e) => res(e.target.result);
        });

        for (let track of rawTracks) {
            const base64Data = await blobToBase64(track.fileData);
            backup.tracks.push({
                playlistId: track.playlistId,
                name: track.name,
                order: track.order,
                mimeType: track.fileData.type,
                fileBase64: base64Data,
                cover: track.cover
            });
        }

        const blob = new Blob([JSON.stringify(backup)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `vibeplayer_sidebar_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        importStatus.style.display = "none";
    });

    function blobToBase64(blob) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(blob);
        });
    }

    inputImport.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        importStatus.textContent = "A ler arquivo de backup...";
        importStatus.style.display = "block";

        const reader = new FileReader();
        reader.onload = async (evt) => {
            try {
                const data = JSON.parse(evt.target.result);
                if (!data.playlists || !data.tracks) {
                    alert("Arquivo de backup inválido!");
                    importStatus.style.display = "none";
                    return;
                }

                importStatus.textContent = "A restaurar tabelas... Aguarde.";
                await new Promise((res) => {
                    const tx1 = db.transaction(['playlists','tracks'], 'readwrite');
                    tx1.objectStore('playlists').clear();
                    tx1.objectStore('tracks').clear();
                    tx1.oncomplete = () => res();
                });

                const playlistIdMap = {};
                for (let pl of data.playlists) {
                    const oldId = pl.id;
                    delete pl.id; 
                    await new Promise((res) => {
                        db.transaction('playlists', 'readwrite').objectStore('playlists').add(pl).onsuccess = (ev) => {
                            playlistIdMap[oldId] = ev.target.result;
                            res();
                        };
                    });
                }

                const txT = db.transaction('tracks', 'readwrite');
                for (let tr of data.tracks) {
                    const blobAudio = base64ToBlob(tr.fileBase64, tr.mimeType);
                    const newTrack = {
                        playlistId: playlistIdMap[tr.playlistId] || activePlaylistId,
                        name: tr.name,
                        order: tr.order,
                        fileData: blobAudio,
                        cover: tr.cover || null
                    };
                    txT.objectStore('tracks').add(newTrack);
                }

                txT.oncomplete = () => {
                    importStatus.style.display = "none";
                    alert("Backup restaurado com sucesso!");
                    location.reload(); 
                };
            } catch (err) {
                alert("Erro ao processar o arquivo de backup.");
                importStatus.style.display = "none";
                console.error(err);
            }
        };
        reader.readAsText(file);
    });

    function base64ToBlob(base64, mimeType) {
        const byteCharacters = atob(base64);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        return new Blob([new Uint8Array(byteNumbers)], { type: mimeType });
    }
</script>
