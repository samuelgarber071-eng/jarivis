<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Inteligência Artificial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #030811;
            color: #00f0ff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .jarvis-container {
            position: relative;
            width: 90vw;
            height: 90vh;
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .system-title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-shadow: 0 0 8px #00f0ff;
        }

        /* Reator ARC Interativo */
        .arc-reactor {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px dashed rgba(0, 240, 255, 0.6);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            animation: rotateClockwise 10s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .arc-reactor:hover {
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.6);
        }

        .arc-reactor.listening {
            border-color: #ff0055;
            box-shadow: 0 0 40px #ff0055;
            animation: rotateClockwise 2s linear infinite;
        }

        .arc-reactor::before {
            content: '';
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid #00f0ff;
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.5);
            animation: rotateCounterClockwise 6s linear infinite;
        }

        .arc-core {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffffff 20%, rgba(0, 240, 255, 0.8) 70%);
            border-radius: 50%;
            box-shadow: 0 0 40px #00f0ff;
        }

        /* Painéis */
        .panel {
            position: absolute;
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 15px;
            font-size: 0.8rem;
        }

        .panel-left { top: 80px; left: 20px; width: 250px; }
        .panel-bottom { bottom: 20px; left: 20px; width: 80%; height: 100px; overflow-y: auto; }

        .btn-mic {
            margin-top: 20px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #00f0ff;
            color: #00f0ff;
            cursor: pointer;
            font-family: monospace;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .btn-mic:hover {
            background: rgba(0, 240, 255, 0.2);
        }

        @keyframes rotateClockwise { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotateCounterClockwise { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    </style>
</head>
<body>

    <div class="jarvis-container">
        <div class="system-title">J.A.R.V.I.S. // IA ATIVA</div>

        <div class="panel panel-left">
            <h3>Status de Voz</h3>
            <div id="status">> Aguardando ativação...</div>
        </div>

        <div class="arc-reactor" id="reactor">
            <div class="arc-core"></div>
        </div>

        <button class="btn-mic" id="mic-btn">Ativar Microfone</button>

        <div class="panel panel-bottom">
            <h3>Transcrição e Respostas</h3>
            <div id="log">> Sistema pronto. Chame por "Jarvis..."</div>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const reactor = document.getElementById('reactor');
        const statusText = document.getElementById('status');
        const logText = document.getElementById('log');

        // Configuração do Reconhecimento de Voz
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            logText.innerText = "> Erro: Seu navegador não suporta reconhecimento de voz. Use o Google Chrome.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = false;

            // Iniciar ao clicar no botão ou reator
            [micBtn, reactor].forEach(element => {
                element.addEventListener('click', () => {
                    recognition.start();
                });
            });

            recognition.onstart = () => {
                statusText.innerText = "> Ouvindo...";
                reactor.classList.add('listening');
            };

            recognition.onend = () => {
                statusText.innerText = "> Aguardando comando...";
                reactor.classList.remove('listening');
            };

            recognition.onresult = (event) => {
                const comando = event.results[0][0].transcript.toLowerCase();
                logText.innerHTML = `<div>Você disse: "${comando}"</div>`;
                processarComando(comando);
            };
        }

        // Função para o Jarvis falar
        function falar(texto) {
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.1; // Velocidade da voz
            utterance.pitch = 1.0; // Tom da voz
            
            // Tenta encontrar uma voz masculina se disponível, senão usa a padrão
            const vozes = window.speechSynthesis.getVoices();
            const vozSelecionada = vozes.find(v => v.name.includes('Google') || v.lang === 'pt-BR');
            if (vozSelecionada) utterance.voice = vozSelecionada;

            window.speechSynthesis.speak(utterance);
            logText.innerHTML += `<div style="color: #fff">> Jarvis: ${texto}</div>`;
        }

        // Inteligência Lógica do Jarvis (Respostas a comandos)
        function processarComando(comando) {
            // Verifica se você chamou o nome dele
            if (comando.includes('jarvis')) {
                
                if (comando.includes('olá') || comando.includes('bom dia') || comando.includes('boa tarde')) {
                    falar("Olá, senhor. Em que posso ser útil hoje?");
                } 
                else if (comando.includes('quem é você') || comando.includes('o que você é')) {
                    falar("Eu sou o Jarvis, o seu assistente virtual pessoal.");
                } 
                else if (comando.includes('status do sistema') || comando.includes('como estão as coisas')) {
                    falar("Todos os sistemas operacionais estão funcionando dentro dos parâmetros normais, senhor.");
                } 
                else if (comando.includes('horas') || comando.includes('que horas são')) {
                    const agora = new Date();
                    const hora = agora.getHours() + " horas e " + agora.getMinutes() + " minutos.";
                    falar("Agora são exatamente " + hora);
                }
                else if (comando.includes('abrir google')) {
                    falar("Abrindo o Google, senhor.");
                    window.open('https://www.google.com', '_blank');
                }
                else if (comando.includes('abrir youtube')) {
                    falar("Acessando o YouTube.");
                    window.open('https://www.youtube.com', '_blank');
                }
                else {
                    falar("Comando reconhecido, mas ainda não tenho instruções para executar essa ação.");
                }

            } else {
                logText.innerHTML += `<div><small>(Dica: Você precisa incluir a palavra "Jarvis" na frase para ele responder)</small></div>`;
            }
        }

        // Carrega vozes do sistema
        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
