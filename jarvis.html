<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clone do ChatGPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #343541;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Área do Chat */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.5;
        }

        /* Mensagem do Usuário */
        .user-message {
            background-color: #202123;
            align-self: flex-end;
        }

        /* Mensagem da IA */
        .bot-message {
            background-color: #444654;
            align-self: flex-start;
        }

        /* Barra de Entrada de Texto */
        .input-area {
            background-color: #40414F;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            background-color: #40414F;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #565869;
            background-color: #40414F;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background-color: #19C37D;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1a9c68;
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chatContainer">
        <div class="message bot-message">Olá! Eu sou a sua IA. Como posso te ajudar hoje?</div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Envie uma mensagem..." onkeypress="verificarTecla(event)">
            <button onclick="enviarMensagem()">Enviar</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        function enviarMensagem() {
            const texto = userInput.value.trim();
            if (texto === "") return; // Não envia se estiver vazio

            // 1. Adiciona a mensagem do usuário na tela
            criarMensagem(texto, 'user-message');
            userInput.value = ""; // Limpa o campo de texto

            // 2. Simula a resposta da IA após 1 segundo
            setTimeout(() => {
                const respostaDaIA = "Interessante! Eu sou apenas uma interface HTML por enquanto, mas logo serei mais inteligente.";
                criarMensagem(respostaDaIA, 'bot-message');
            }, 1000);
        }

        function criarMensagem(texto, classe) {
            const div = document.createElement('div');
            div.className = `message ${classe}`;
            div.innerText = texto;
            chatContainer.appendChild(div);
            
            // Rola o chat para baixo automaticamente
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Permite enviar a mensagem apertando a tecla Enter
        function verificarTecla(event) {
            if (event.key === "Enter") {
                enviarMensagem();
            }
        }
    </script>
</body>
</html>
