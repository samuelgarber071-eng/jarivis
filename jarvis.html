<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clone do ChatGPT - Modo Wikipédia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #343541;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.5;
        }

        .user-message {
            background-color: #202123;
            align-self: flex-end;
        }

        .bot-message {
            background-color: #444654;
            align-self: flex-start;
        }

        .input-area {
            background-color: #40414F;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            background-color: #40414F;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #565869;
            background-color: #40414F;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background-color: #19C37D;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a9c68;
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chatContainer">
        <div class="message bot-message">Olá! Eu sou sua IA conectada à Wikipédia. Pode me perguntar sobre qualquer assunto (ex: "Quem foi Albert Einstein?" ou "Como funciona a fotossíntese?").</div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Pergunte algo para a Wikipédia..." onkeypress="verificarTecla(event)">
            <button onclick="enviarMensagem()">Enviar</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        async function enviarMensagem() {
            const textoUsuario = userInput.value.trim();
            if (textoUsuario === "") return;

            // 1. Mostra a mensagem do usuário
            criarMensagem(textoUsuario, 'user-message');
            userInput.value = ""; 

            // 2. Balão de "Pensando..."
            const balaoIA = criarMensagem("Pesquisando na Wikipédia...", 'bot-message');

            try {
                // ETAPA 1: Pesquisar termos relacionados na Wikipédia
                const urlBusca = `https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(textoUsuario)}&format=json&origin=*`;
                const respostaBusca = await fetch(urlBusca);
                const dadosBusca = await respostaBusca.json();

                // Se não encontrar nenhum resultado na busca
                if (!dadosBusca.query.search || dadosBusca.query.search.length === 0) {
                    balaoIA.innerText = `Não encontrei nenhum artigo na Wikipédia sobre "${textoUsuario}". Tente usar outras palavras!`;
                    return;
                }

                // Pega o título do primeiro artigo mais relevante encontrado
                const tituloArtigo = dadosBusca.query.search[0].title;

                // ETAPA 2: Buscar o resumo desse artigo específico
                const urlResumo = `https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(tituloArtigo)}`;
                const respostaResumo = await fetch(urlResumo);
                const dadosResumo = await respostaResumo.json();

                // Exibe o resumo na tela
                balaoIA.innerText = dadosResumo.extract;

            } catch (erro) {
                balaoIA.innerText = "Ops! Tive um problema de conexão ao acessar a Wikipédia. Tente novamente mais tarde.";
                console.error(erro);
            }
        }

        function criarMensagem(texto, classe) {
            const div = document.createElement('div');
            div.className = `message ${classe}`;
            div.innerText = texto;
            chatContainer.appendChild(div);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function verificarTecla(event) {
            if (event.key === "Enter") {
                enviarMensagem();
            }
        }
    </script>
</body>
</html>
