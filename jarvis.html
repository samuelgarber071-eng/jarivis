<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Music Player</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1e24, #111115);
            --sidebar-bg: rgba(0, 0, 0, 0.6);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --accent-color: #1db954;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            transition: background 0.8s ease;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--accent-color);
        }

        .menu-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .playlist-list {
            list-style: none;
            overflow-y: auto;
            max-height: 200px;
        }

        .playlist-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 5px;
        }

        .playlist-item:hover, .playlist-item.active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow-y: auto;
        }

        /* Player Central */
        .player-container {
            display: flex;
            align-items: center;
            gap: 40px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .album-cover {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            object-fit: cover;
            background: #333;
        }

        .track-info h2 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .track-info p {
            color: #b3b3b3;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        /* Music List / Manager */
        .music-manager {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
        }

        .music-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .music-table th, .music-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .actions-cell {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 5px;
        }

        /* Form Modal-like */
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        input, select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🎛️ WAVEFLOW</div>
        
        <div class="menu-section">
            <h3>Playlists</h3>
            <ul class="playlist-list" id="playlistContainer">
                <li class="playlist-item active" onclick="filterPlaylist('todas')">Todas as Músicas</li>
                <li class="playlist-item" onclick="filterPlaylist('favoritas')">Favoritas</li>
                <li class="playlist-item" onclick="filterPlaylist('arquivadas')">Arquivadas 📦</li>
            </ul>
        </div>

        <div class="menu-section" style="margin-top:auto;">
            <h3>Backup</h3>
            <button class="btn btn-secondary" onclick="exportBackup()">📥 Exportar JSON</button>
            <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📤 Importar JSON</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importBackup(event)">
        </div>
    </div>

    <div class="main-content">
        
        <div class="player-container" id="playerView">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400" alt="Capa do Álbum" class="album-cover" id="currentCover">
            <div class="track-info">
                <h2 id="currentTitle">Nenhuma música selecionada</h2>
                <p id="currentArtist">Selecione ou adicione uma faixa abaixo</p>
                
                <div class="controls">
                    <button class="btn" onclick="togglePlay()">▶ Play / Pausar</button>
                    <div class="volume-container">
                        <span>🔊</span>
                        <input type="range" id="volumeSlider" min="0" max="100" value="80" oninput="updateVolume(this.value)">
                    </div>
                </div>
            </div>
        </div>

        <div class="music-manager">
            <h3>Adicionar Nova Música</h3>
            <div class="form-group" style="margin-top: 15px;">
                <input type="text" id="trackTitle" placeholder="Nome da Música">
                <input type="text" id="trackArtist" placeholder="Artista/Álbum">
                <select id="trackColor">
                    <option value="#2c3e50">Azul Escuro</option>
                    <option value="#8e44ad">Roxo</option>
                    <option value="#27ae60">Verde</option>
                    <option value="#e74c3c">Vermelho</option>
                    <option value="#d35400">Laranja</option>
                </select>
                <input type="text" id="trackCoverUrl" placeholder="URL da Capa (Opcional)">
                <button class="btn" onclick="addMusic()">Adicionar</button>
            </div>

            <h3>Sua Biblioteca</h3>
            <table class="music-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Artista/Álbum</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="musicTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Banco de dados inicial padrão (Salvo no LocalStorage)
        let library = JSON.parse(localStorage.getItem('waveflow_db')) || [
            { id: 1, title: "Midnight City", artist: "M83", color: "#8e44ad", cover: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=400", archived: false, playlist: "favoritas" },
            { id: 2, title: "Ocean Drive", artist: "Duke Dumont", color: "#2c3e50", cover: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=400", archived: false, playlist: "todas" }
        ];

        let currentFilter = 'todas';

        // Renderiza a tabela de músicas baseado nos filtros
        function renderLibrary() {
            const tbody = document.getElementById('musicTableBody');
            tbody.innerHTML = '';

            const filtered = library.filter(track => {
                if (currentFilter === 'arquivadas') return track.archived === true;
                if (currentFilter === 'favoritas') return track.playlist === 'favoritas' && !track.archived;
                return !track.archived; // 'todas' pega as não arquivadas
            });

            filtered.forEach(track => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="cursor:pointer; font-weight:600;" onclick="playTrack(${track.id})">▶ ${track.title}</td>
                    <td>${track.artist}</td>
                    <td class="actions-cell">
                        <button class="btn btn-secondary btn-small" onclick="toggleArchive(${track.id})">
                            ${track.archived ? 'Desarquivar' : '📦 Arquivar'}
                        </button>
                        <button class="btn btn-secondary btn-small" style="background:rgba(231,76,60,0.2)" onclick="deleteTrack(${track.id})">❌ Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            localStorage.setItem('waveflow_db', JSON.stringify(library));
        }

        // Toca a música e muda dinamicamente o fundo baseado na cor configurada no álbum
        function playTrack(id) {
            const track = library.find(t => t.id === id);
            if (!track) return;

            document.getElementById('currentTitle').innerText = track.title;
            document.getElementById('currentArtist').innerText = track.artist;
            if(track.cover) document.getElementById('currentCover').src = track.cover;

            // Transição de cor de fundo dinâmica baseada no álbum
            document.body.style.background = `linear-gradient(135deg, ${track.color}, #111115)`;
        }

        // Adiciona nova música
        function addMusic() {
            const title = document.getElementById('trackTitle').value;
            const artist = document.getElementById('trackArtist').value;
            const color = document.getElementById('trackColor').value;
            let cover = document.getElementById('trackCoverUrl').value;

            if (!title || !artist) {
                alert('Por favor, preencha Título e Artista.');
                return;
            }

            if (!cover) cover = "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400";

            const newTrack = {
                id: Date.now(),
                title,
                artist,
                color,
                cover,
                archived: false,
                playlist: 'todas'
            };

            library.push(newTrack);
            renderLibrary();

            // Limpa os campos
            document.getElementById('trackTitle').value = '';
            document.getElementById('trackArtist').value = '';
            document.getElementById('trackCoverUrl').value = '';
        }

        // Arquivar / Desarquivar
        function toggleArchive(id) {
            const track = library.find(t => t.id === id);
            if (track) {
                track.archived = !track.archived;
                renderLibrary();
            }
        }

        // Excluir Definitivamente
        function deleteTrack(id) {
            if(confirm("Tem certeza que deseja deletar permanentemente esta música?")) {
                library = library.filter(t => t.id !== id);
                renderLibrary();
            }
        }

        // Filtrar pelas abas laterais
        function filterPlaylist(type) {
            currentFilter = type;
            document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            renderLibrary();
        }

        // Feedback visual do volume
        function updateVolume(val) {
            console.log(`Volume alterado para: ${val}%`);
            // Aqui controlaria um elemento <audio> real se houvesse streaming de som implícito
        }

        function togglePlay() {
            alert("Modo de reprodução simulado! Adicione arquivos de áudio reais para tocar som.");
        }

        // SISTEMA DE BACKUP (JSON)
        function exportBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(library, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "waveflow_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importBackup(event) {
            const fileReader = new FileReader();
            fileReader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        library = importedData;
                        renderLibrary();
                        alert("Backup importado com sucesso!");
                    } else {
                        alert("Formato de arquivo inválido.");
                    }
                } catch (err) {
                    alert("Erro ao ler o arquivo de backup.");
                }
            };
            fileReader.readAsText(event.target.files[0]);
        }

        // Inicialização
        renderLibrary();
    </script>
</body>
</html>
